<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ninja2 현재 vs 시안</title>
<style>
  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #101914;
    color: #f8ead1;
    font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }

  body {
    padding: 14px;
  }

  .comparison {
    display: grid;
    grid-template-columns: minmax(320px, 440px) minmax(320px, 440px);
    gap: 16px;
    align-items: start;
    justify-content: center;
  }

  .label {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 30px;
    margin-bottom: 8px;
    border: 2px solid #28382d;
    border-radius: 8px;
    background: #18251d;
    font-size: 14px;
    font-weight: 900;
  }

  .frame {
    width: 100%;
    aspect-ratio: 440 / 782;
    overflow: hidden;
    border: 4px solid #17241d;
    border-radius: 10px;
    background: #07110c;
    box-shadow: 0 10px 0 rgba(0, 0, 0, .24);
  }

  iframe,
  img {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
  }

  iframe {
    background: #102219;
  }

  img {
    object-fit: contain;
    object-position: top center;
  }

  @media (max-width: 760px) {
    body { padding: 10px; }

    .comparison {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <main class="comparison">
    <section>
      <div class="label">현재 런타임</div>
      <div class="frame">
        <iframe src="/harness/runtime/survivor-runtime.html?game=ninja2&compare=rulelocked7" title="현재 런타임"></iframe>
      </div>
    </section>
    <section>
      <div class="label">정본 시안</div>
      <div class="frame">
        <img src="/harness/design/ninja2/concepts/ninja2_rulelocked_housing_home_a.png" alt="Ninja2 rulelocked housing home A">
      </div>
    </section>
  </main>
</body>
</html>
