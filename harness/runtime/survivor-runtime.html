<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ninja2 Phaser Demo</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<style>
:root {
  color-scheme: dark;
  --ink: #f8ead1;
  --ink-soft: rgba(248, 234, 209, 0.74);
  --ink-dim: rgba(248, 234, 209, 0.54);
  --panel: rgba(39, 33, 25, 0.9);
  --panel-strong: rgba(27, 24, 19, 0.96);
  --line: rgba(248, 234, 209, 0.18);
  --gold: #ffc64a;
  --mint: #86c857;
  --coral: #f47b22;
  --sky: #36e0d4;
  --outline: #171f18;
  --shadow: rgba(0, 0, 0, 0.32);
  --font: system-ui, -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  --level-modal-pad-top: 26px;
  --level-modal-pad-x: 12px;
  --level-modal-pad-bottom: 86px;
  --level-panel-width: min(760px, calc(100vw - 24px));
  --level-panel-max-height: 78dvh;
  --level-panel-outline: 4px;
  --level-panel-radius: 14px;
  --level-head-pad-top: 34px;
  --level-head-pad-x: 14px;
  --level-head-pad-bottom: 8px;
  --level-head-gap: 10px;
  --level-grid-gap: 10px;
  --level-grid-pad-x: 14px;
  --level-grid-pad-top: 12px;
  --level-grid-pad-bottom: 16px;
  --level-card-min-height: 258px;
  --level-card-pad-x: 8px;
  --level-card-pad-top: 10px;
  --level-card-pad-bottom: 9px;
  --level-card-outline: 4px;
  --level-card-radius: 8px;
  --level-badge-min-width: 42px;
  --level-badge-pad-x: 7px;
  --level-badge-pad-y: 3px;
  --level-badge-outline: 3px;
  --level-frame-crest-width: 154px;
  --level-frame-crest-height: 96px;
  --level-frame-corner-size: 82px;
  --level-icon-size: 52px;
  --level-icon-outline: 4px;
  --level-name-font-size: 15px;
  --level-name-min-height: 34px;
  --level-desc-min-height: 32px;
  --home-top-height: 96px;
  --home-board-top: 96px;
  --home-board-bottom: 268px;
  --home-bottom-action-bottom: max(92px, calc(84px + env(safe-area-inset-bottom)));
  --home-bottom-nav-height: max(88px, calc(80px + env(safe-area-inset-bottom)));
  --home-layer-top: 300;
  --home-layer-side: 280;
  --home-layer-bottom: 270;
  --home-layer-board-max: 230;
}

* { box-sizing: border-box; }

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #102219;
  color: var(--ink);
  font-family: var(--font);
}

button {
  font: inherit;
}

#survivorShell {
  position: relative;
  width: 100vw;
  height: 100dvh;
  min-height: 520px;
  background: #102219;
}

#gameStage {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

#gameStage canvas {
  display: block;
}

.home-section-skin-stage {
  position: absolute;
  z-index: 0;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.home-section-skin-stage canvas {
  display: block;
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

html[data-survivor-mode="home"] #gameStage,
html[data-survivor-mode="result"] #gameStage {
  opacity: 0;
  pointer-events: none;
}

.home-top-skin-stage {
  border-radius: 0;
}

html[data-survivor-mode="home"] .hud,
html[data-survivor-mode="result"] .hud {
  display: none;
}

html[data-survivor-mode="home"] .actions,
html[data-survivor-mode="result"] .actions {
  display: none;
}

.home-screen,
.result-screen {
  position: absolute;
  inset: 0;
  z-index: 8;
  display: none;
  width: 100%;
  max-width: 440px;
  margin: 0 auto;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(8, 31, 21, .18) 0%, rgba(49, 91, 51, .08) 42%, rgba(16, 34, 25, .2) 100%),
    url("./assets/ninja2/home/background_forest_sanctuary.png?v=ninja2-home-bg1"),
    linear-gradient(180deg, #173224 0%, #315b33 42%, #173224 100%);
  background-position:
    center,
    calc(50% + var(--home-bg-pan-x, 0px)) calc(50% + var(--home-bg-pan-y, 0px)),
    center;
  background-repeat: no-repeat, no-repeat, no-repeat;
  background-size: auto, cover, auto;
  box-shadow: inset 0 0 0 5px rgba(20, 31, 22, 0.58);
  pointer-events: auto;
}

.home-screen::before,
.home-screen::after {
  content: "";
  position: absolute;
  z-index: 1;
  pointer-events: none;
}

.home-screen::before {
  inset: 0;
  background:
    radial-gradient(circle at 25% 24%, rgba(248,234,209,.14) 0 1.2%, transparent 1.8%),
    radial-gradient(circle at 77% 36%, rgba(248,234,209,.12) 0 1.1%, transparent 1.7%),
    radial-gradient(circle at 18% 64%, rgba(255,198,74,.12) 0 1.4%, transparent 2%),
    radial-gradient(circle at 18% 8%, rgba(255, 198, 74, .22) 0 2%, transparent 3%),
    radial-gradient(circle at 85% 82%, rgba(54, 224, 212, .18) 0 2%, transparent 3%);
  opacity: .5;
}

.home-screen::after {
  inset: 104px 0 136px;
  background:
    linear-gradient(180deg, rgba(23, 50, 36, .02), transparent 18%, transparent 72%, rgba(23, 50, 36, .08));
}

.home-screen.is-open,
.result-screen.is-open {
  display: block;
}

.home-top {
  position: absolute;
  z-index: var(--home-layer-top);
  top: 0;
  right: 0;
  left: 0;
  height: max(var(--home-top-height), calc(96px + env(safe-area-inset-top)));
  display: block;
  padding: max(8px, env(safe-area-inset-top)) 8px 0;
}

.home-top::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: 0 0 auto;
  height: max(var(--home-top-height), calc(96px + env(safe-area-inset-top)));
  background:
    linear-gradient(180deg, rgba(7, 23, 15, .58) 0%, rgba(7, 23, 15, .22) 62%, rgba(7, 23, 15, 0) 100%);
  box-shadow: none;
  pointer-events: none;
}

.home-top::after {
  content: "";
  position: absolute;
  z-index: -1;
  right: 0;
  top: max(var(--home-top-height), calc(96px + env(safe-area-inset-top)));
  left: 0;
  height: 8px;
  border-radius: 0;
  background: linear-gradient(180deg, rgba(8, 25, 17, .24), rgba(8, 25, 17, 0));
  filter: none;
  pointer-events: none;
}

.demo-ribbon {
  display: none;
  position: absolute;
  z-index: 5;
  top: max(126px, calc(118px + env(safe-area-inset-top)));
  right: 10px;
  padding: 5px 9px;
  border: 3px solid #17241d;
  border-radius: 999px;
  background: #ffe36a;
  color: #17241d;
  font-size: 11px;
  font-weight: 900;
  box-shadow: 0 3px 0 rgba(0, 0, 0, .25);
}

.home-portrait,
.home-status,
  .home-resources,
  .home-side-button,
  .home-panel,
.sortie-button,
.home-tab,
.result-card,
.result-return {
  border: 4px solid var(--outline);
  box-shadow: inset 0 3px 0 rgba(255, 245, 199, 0.28), 0 4px 0 rgba(0, 0, 0, 0.28);
}

.home-portrait {
  position: absolute;
  top: max(8px, env(safe-area-inset-top));
  left: 2px;
  display: block;
  width: 82px;
  height: 88px;
  padding: 0;
  overflow: visible;
  border: 0;
  border-radius: 0;
  background: none;
  box-shadow: none;
  color: var(--outline);
}

.portrait-face {
  position: absolute;
  top: 0;
  left: 4px;
  display: block;
  width: 70px;
  height: 70px;
  margin: 0;
  overflow: hidden;
  border: 5px solid #e4bd61;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 38%, rgba(255, 248, 205, .42) 0 18%, rgba(255, 198, 74, .1) 38%, transparent 56%),
    url("./assets/ninja2/ui/profile_guardian.png?v=ninja2-resources1") 50% 36% / 132% auto no-repeat,
    #7b4a28;
  box-shadow:
    0 0 0 3px #171f18,
    inset 0 0 0 2px rgba(255, 246, 214, .34),
    0 5px 0 rgba(0, 0, 0, .34);
  color: transparent;
  font-size: 0;
  font-weight: 900;
  transform: none;
}

.home-portrait::before {
  content: none;
}

.home-portrait::after {
  content: "";
  position: absolute;
  z-index: 3;
  left: 21px;
  bottom: 3px;
  width: 57px;
  height: 16px;
  border: 3px solid #171f18;
  border-radius: 999px;
  background:
    linear-gradient(90deg, #85d92e 0 68%, #3d6028 69% 100%);
  box-shadow: inset 0 2px 0 rgba(255, 255, 190, .38), 0 3px 0 rgba(0, 0, 0, .28);
}

.home-portrait strong,
.home-portrait span {
  display: block;
  line-height: 1.05;
  text-align: center;
}

.home-portrait strong {
  display: none;
}
.home-portrait span {
  position: absolute;
  z-index: 4;
  left: 0;
  top: 53px;
  display: grid;
  width: 28px;
  height: 28px;
  align-items: center;
  justify-items: center;
  overflow: hidden;
  max-width: none;
  margin-top: 0;
  border: 3px solid #171f18;
  border-radius: 50%;
  background: linear-gradient(180deg, #4c3924, #251b13);
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .24), 0 3px 0 rgba(0, 0, 0, .3);
  color: #fff6d6;
  font-size: 15px;
  line-height: 1;
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(0, 0, 0, .58);
  text-overflow: clip;
  white-space: nowrap;
}

.home-status {
  display: none;
  position: relative;
  z-index: 1;
  grid-column: 2;
  grid-row: 2;
  width: min(244px, 100%);
  height: 58px;
  justify-self: center;
  min-height: 0;
  grid-template-columns: minmax(0, 1fr);
  grid-template-rows: minmax(0, 1fr) 9px;
  align-items: center;
  padding: 8px 17px 10px;
  border: 4px solid #171f18;
  border-radius: 21px;
  background: linear-gradient(#34291e, #1d1812);
  box-shadow: inset 0 2px 0 rgba(255, 245, 199, .16), 0 4px 0 rgba(0,0,0,.28);
  text-align: center;
}

.home-status-title {
  overflow: hidden;
  color: #fff6d6;
  font-size: 19px;
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 3px 0 #000;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.home-status-title::before {
  content: none;
}

.home-status-value {
  display: none;
}

.home-status-value::before {
  content: none;
}

.light-track,
.mini-progress {
  overflow: hidden;
  height: 8px;
  margin: 6px auto 0;
  border: 2px solid #111b14;
  border-radius: 999px;
  background: #111b14;
}

.home-status .light-track {
  grid-column: 1 / -1;
  width: 100%;
  height: 9px;
  margin-top: 0;
}

.light-track i,
.mini-progress i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #36e0d4, #ffc64a);
}

.light-copy {
  display: none;
  margin-top: 0;
  color: rgba(255, 246, 214, 0.78);
  font-size: 8px;
  font-weight: 800;
}

.home-resources {
  position: absolute;
  z-index: 1;
  top: max(8px, calc(8px + env(safe-area-inset-top)));
  right: 10px;
  left: 91px;
  isolation: isolate;
  display: grid;
  grid-template-columns: 1.05fr 1.05fr 1.16fr 1.44fr;
  grid-template-rows: 34px;
  gap: 4px;
  height: 34px;
  padding: 0;
  border: 0;
  border-radius: 0;
  background: none;
  box-shadow: none;
}

.home-resources::before,
.resource-ledger::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: 0;
  border: 24px solid transparent;
  border-image: url("./assets/ninja2/ui/topbar/top_resource_board.png?v=ninja2-nineslice1") 24 fill stretch;
  pointer-events: none;
}

.home-resources::before {
  content: none;
}

.resource-row {
  position: relative;
  isolation: isolate;
  display: grid;
  grid-template-columns: 20px minmax(0, 1fr);
  column-gap: 2px;
  align-items: center;
  min-height: 34px;
  overflow: hidden;
  padding: 0 2px 0 5px;
  border: 0;
  border-radius: 0;
  background: none;
  color: #fff6d6;
  font-size: 16px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  transition: filter .14s ease, transform .14s ease;
}

.resource-row:nth-child(4) {
  grid-template-columns: 20px minmax(0, 1fr);
  column-gap: 2px;
  margin-right: 27px;
  padding-right: 2px;
  padding-left: 4px;
}

.resource-row::before,
.ledger-row::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: 0;
  border: solid transparent;
  border-width: 12px 14px;
  border-image: url("./assets/ninja2/ui/topbar/top_resource_chip.png?v=ninja2-nineslice1") 14 18 fill stretch;
  pointer-events: none;
}

.resource-row::before {
  border-width: 12px 16px;
}

html[data-home-nineslice="phaser"] .resource-row::before,
html[data-home-nineslice="phaser"] .home-panel::before {
  content: none;
}

.resource-row b {
  grid-column: 2;
  overflow: hidden;
  min-width: 0;
  font-size: clamp(12px, 3.1vw, 14px);
  line-height: 1;
  text-align: center;
  text-overflow: clip;
  white-space: nowrap;
}

.resource-row.is-income-gaining {
  filter: drop-shadow(0 0 8px rgba(255, 198, 74, .5));
  transform: translateY(-1px) scale(1.015);
}

.resource-row.is-income-idle .resource-rate {
  display: none;
  color: rgba(255, 246, 214, .54);
}

.resource-rate {
  display: none;
  grid-column: 3;
  overflow: hidden;
  min-width: 0;
  color: #9dff55;
  font-size: 6px;
  font-style: normal;
  font-weight: 900;
  line-height: 1;
  text-align: right;
  text-overflow: ellipsis;
  text-shadow: 0 2px 0 #000;
  white-space: nowrap;
}

.resource-gain {
  display: none;
  position: absolute;
  top: 0;
  right: -27px;
  grid-column: auto;
  width: 27px;
  height: 31px;
  overflow: hidden;
  border: 3px solid #171f18;
  border-radius: 50%;
  background:
    url("./assets/ninja2/ui/topbar/icon_plus_cream.png?v=ninja2-icons-v3") center / 72% auto no-repeat,
    linear-gradient(180deg, #f7d991, #b68539);
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .42), 0 3px 0 rgba(0, 0, 0, .32);
  color: transparent;
  font-size: 0;
  pointer-events: none;
}

.resource-row:nth-child(4) .resource-gain {
  display: block;
}

.home-top-actions {
  position: absolute;
  z-index: 1;
  top: max(44px, calc(44px + env(safe-area-inset-top)));
  right: 10px;
  display: grid;
  grid-template-columns: 80px 35px 35px;
  grid-template-rows: 35px;
  gap: 5px;
  justify-content: end;
  min-height: 35px;
}

.people-chip,
.top-icon-button {
  border: 3px solid var(--outline);
  border-radius: 13px;
  background: #2b241c;
  color: #f8ead1;
  box-shadow: inset 0 2px 0 rgba(255, 245, 199, .16), 0 4px 0 rgba(0,0,0,.28);
}

.people-chip {
  display: grid;
  grid-template-columns: 20px minmax(0, 1fr);
  align-items: center;
  height: 35px;
  min-height: 35px;
  padding: 0 8px;
  color: #ffc64a;
  font-size: 16px;
  font-weight: 900;
}

.people-chip i {
  display: block;
  width: 22px;
  height: 22px;
  background: url("./assets/ninja2/ui/icons/icon_population.png?v=ninja2-icons-v3") center / contain no-repeat;
  filter: drop-shadow(0 2px 0 rgba(0, 0, 0, .32));
}

.people-chip b {
  color: #f8ead1;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

.top-icon-button {
  position: relative;
  display: grid;
  width: 35px;
  height: 35px;
  min-height: 35px;
  overflow: hidden;
  padding: 7px;
  cursor: pointer;
  color: transparent;
  font-size: 0;
  font-weight: 900;
  place-items: center;
}

.top-icon-button::before {
  content: "";
  display: block;
  width: 24px;
  height: 24px;
  background: var(--top-action-icon) center / contain no-repeat;
  filter: drop-shadow(0 2px 0 rgba(0, 0, 0, .42));
}

.top-icon-button[aria-label="메뉴"] {
  --top-action-icon: url("./assets/ninja2/ui/icons/icon_menu.png?v=ninja2-icons-v3");
}

.top-icon-button[aria-label="설정"] {
  --top-action-icon: url("./assets/ninja2/ui/icons/icon_settings.png?v=ninja2-icons-v3");
}

.home-settings-panel[hidden] {
  display: none;
}

.home-settings-panel {
  position: absolute;
  z-index: calc(var(--home-layer-bottom) + 18);
  inset: 0;
  display: grid;
  align-items: center;
  justify-items: center;
  padding:
    max(16px, env(safe-area-inset-top))
    14px
    max(16px, env(safe-area-inset-bottom));
  pointer-events: auto;
}

.home-settings-backdrop {
  position: absolute;
  inset: 0;
  border: 0;
  border-radius: 0;
  background: rgba(7, 18, 13, .32);
  pointer-events: auto;
}

.home-settings-card {
  position: relative;
  z-index: 1;
  display: grid;
  width: min(388px, calc(100vw - 28px));
  max-height: min(520px, calc(100dvh - 32px));
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 10px;
  padding: 28px 22px 18px;
  color: #17241d;
  pointer-events: auto;
}

.home-settings-card::before {
  content: "";
  position: absolute;
  z-index: -2;
  inset: 0;
  border: 4px solid #171f18;
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(255, 246, 214, .98), rgba(223, 196, 134, .98)),
    #f8ead1;
  box-shadow: 0 10px 0 rgba(0, 0, 0, .28), inset 0 3px 0 rgba(255, 255, 255, .42);
}

html[data-home-nineslice-modal="phaser"] .home-settings-card::before {
  display: none;
}

.home-settings-skin-stage {
  z-index: -1;
  border-radius: 20px;
}

.home-settings-head {
  display: grid;
  min-height: 74px;
  grid-template-columns: minmax(0, 1fr) 42px;
  gap: 10px;
  align-items: center;
  padding: 0 0 8px;
}

.home-settings-head b {
  display: block;
  color: #17241d;
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

.home-settings-head span {
  display: block;
  margin-top: 4px;
  color: rgba(23, 36, 29, .7);
  font-size: 11px;
  font-weight: 800;
  line-height: 1.15;
}

.home-settings-close {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 3px solid #171f18;
  border-radius: 50%;
  background: #fff6d6;
  color: #17241d;
  font-size: 20px;
  font-weight: 900;
  line-height: 1;
  box-shadow: 0 3px 0 rgba(0, 0, 0, .18);
  cursor: pointer;
}

.home-settings-body {
  display: grid;
  min-height: 0;
  gap: 10px;
  overflow-x: hidden;
  overflow-y: auto;
  scrollbar-width: none;
}

.home-settings-body::-webkit-scrollbar {
  display: none;
}

.home-settings-identity,
.home-setting-row {
  min-width: 0;
  border: 3px solid #171f18;
  border-radius: 12px;
  background: linear-gradient(180deg, #fff8dc, #e5c982);
  box-shadow: inset 0 2px 0 rgba(255, 255, 255, .4), 0 4px 0 rgba(0, 0, 0, .18);
}

.home-settings-identity {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr);
  gap: 9px;
  align-items: center;
  min-height: 62px;
  padding: 8px;
}

.home-settings-avatar {
  display: block;
  width: 38px;
  height: 38px;
  border: 3px solid #171f18;
  border-radius: 50%;
  background:
    url("./assets/ninja2/ui/profile_guardian.png?v=ninja2-profile1") center 34% / 158% auto no-repeat,
    linear-gradient(180deg, #f3c35b, #7c4b2a);
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .35);
}

.home-settings-identity span,
.home-setting-copy span {
  display: block;
  color: rgba(23, 36, 29, .68);
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
}

.home-settings-identity strong {
  display: block;
  min-width: 0;
  margin-top: 4px;
  overflow: hidden;
  color: #17241d;
  font-size: 18px;
  font-weight: 900;
  line-height: 1.05;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.home-setting-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) 54px;
  gap: 8px;
  align-items: center;
  min-height: 54px;
  padding: 7px 8px;

  gap: 4px;
  overflow: hidden;
}

.profile-skill-icon {
  position: relative;
  display: grid;
  width: 19px;
  height: 19px;
  flex: 0 0 19px;
  border: 2px solid rgba(23, 31, 24, .96);
  border-radius: 7px;
  background:
    radial-gradient(circle at 42% 32%, rgba(255,255,255,.34) 0 17%, transparent 18%),
    linear-gradient(145deg, rgba(248, 234, 209, .16), rgba(23, 31, 24, .82)),

  box-shadow: inset 0 1px 0 rgba(255, 246, 214, .28), 0 1px 0 rgba(0,0,0,.28);

  content: "";
  position: absolute;
  inset: -8px;
  border: 2px solid var(--skill-color, #ffc64a);

  opacity: 0;
  animation: profileSkillCastRing 760ms ease-out;

  position: absolute;

  border-radius: 999px;
  background: #ffc64a;
  color: #17241d;
  font-size: 7px;
  font-style: normal;
  font-weight: 900;

  text-align: center;

.skill-cast-chip {
  display: inline-flex;

  border-radius: 999px;
  background: rgba(255, 246, 214, .92);
  color: #17241d;

  font-weight: 900;

.skill-cast-chip i {
  display: grid;

.skill-cast-chip img {

  height: 100%;

}

.skill-cast-chip span {
  min-width: 0;
  overflow: hidden;

@keyframes profileSkillCastPulse {
  0% { filter: brightness(1); transform: scale(1); }
  22% { filter: brightness(1.8); transform: scale(1.24); }
  56% { filter: brightness(1.28); transform: scale(1.08); }
  100% { filter: brightness(1); transform: scale(1); }
}

@keyframes profileSkillCastRing {
  0% { opacity: .86; transform: scale(.55); }
  100% { opacity: 0; transform: scale(1.55); }
}

@keyframes skillCastChipIn {
  0% { opacity: 0; transform: translateY(6px) scale(.94); }
  16% { opacity: 1; transform: translateY(0) scale(1); }
  78% { opacity: 1; }
  100% { opacity: .86; }

}

.ledger-gold .ledger-icon {
  border-radius: 0;
  background-image: url("./assets/ninja2/ui/topbar/icon_coin.png?v=ninja2-icons-v3");
}

.ledger-value {
  min-width: 2ch;
  overflow: hidden;
  text-align: right;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ledger-gain {
  min-width: 24px;
  color: #9dff55;
  font-size: 11px;
  line-height: 1;
  opacity: 0;
  text-align: right;
  transform: translateY(5px);
}

.ledger-row.is-gaining .ledger-gain {
  animation: ledgerGainFloat .68s ease-out both;
}

@keyframes ledgerGainFloat {
  0% { opacity: 0; transform: translateY(7px) scale(.8); }
  18% { opacity: 1; transform: translateY(0) scale(1.12); }
  100% { opacity: 0; transform: translateY(-13px) scale(1); }
}

.hud-pause-button {
  grid-area: pause;
  width: 44px;
  height: 58px;
  border-radius: 15px;
  pointer-events: auto;
}

.stage-track {
  position: absolute;
  left: 50%;
  top: 112px;
  display: grid;
  width: min(360px, calc(100vw - 96px));
  grid-template-columns: repeat(8, 1fr) 36px;
  gap: 3px;
  transform: translateX(-50%);
  align-items: center;
}

.stage-track i {
  height: 10px;
  border: 2px solid var(--outline);
  border-radius: 4px;
  background: #26342b;
  transition: background 0.16s linear, box-shadow 0.16s linear;
}

.stage-track i.is-active {
  background: #ffc64a;
  box-shadow: 0 0 10px rgba(255, 198, 74, .44);
}

.stage-track b {
  display: grid;
  width: 32px;
  height: 32px;
  border: 4px solid var(--outline);
  border-radius: 50%;
  background:
    url("./assets/ninja2/ui/battle-counters/counter_boss.png?v=ninja2-counter-icons-v1") center / 92% auto no-repeat,
    #f8ead1;
  color: transparent;
  font-size: 15px;
  place-items: center;
}

.battle-objective {
  position: absolute;
  left: 50%;
  top: 150px;
  display: grid;
  width: min(420px, calc(100vw - 56px));
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 6px;
  align-items: center;
  padding: 6px 9px;
  border: 3px solid var(--outline);
  border-radius: 999px;
  background: rgba(23, 31, 24, .86);
  color: #fff6d6;
  font-size: 12px;
  font-weight: 900;
  box-shadow: 0 4px 0 rgba(0, 0, 0, .24);
  transform: translateX(-50%);
}

.battle-objective strong {
  overflow: hidden;
  color: #ffe36a;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.battle-objective span {
  display: inline-grid;
  grid-auto-flow: column;
  gap: 4px;
  align-items: center;
  color: rgba(248, 234, 209, .78);
}

.battle-objective b {
  color: #f8ead1;
}

.companion-skill-dock {
  position: absolute;
  right: max(14px, env(safe-area-inset-right));
  bottom: max(78px, calc(70px + env(safe-area-inset-bottom)));
  display: grid;
  grid-template-columns: repeat(3, 62px);
  gap: 8px;
  align-items: end;
  pointer-events: auto;
}

.companion-skill {
  position: relative;
  display: grid;
  width: 62px;
  height: 72px;
  min-width: 0;
  grid-template-rows: 42px 14px 13px;
  align-items: center;
  justify-items: center;
  padding: 4px 3px 3px;
  overflow: hidden;
  border: 4px solid var(--outline);
  border-radius: 16px;
  background:
    conic-gradient(from -90deg, var(--companion-color) var(--cooldown-angle, 360deg), rgba(23, 31, 24, .82) 0),
    radial-gradient(circle at 48% 34%, rgba(248, 234, 209, .2), rgba(23, 31, 24, .92));
  color: #fff6d6;
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .22), 0 4px 0 rgba(0, 0, 0, .28);
  cursor: pointer;
}

.companion-skill::before {
  content: "";
  position: absolute;
  inset: 5px;
  z-index: 0;
  border-radius: 12px;
  background: rgba(23, 31, 24, .9);
}

.companion-skill > * {
  position: relative;
  z-index: 1;
}

.companion-skill-icon {
  display: grid;
  width: 38px;
  height: 38px;
  place-items: center;
  overflow: hidden;
  border: 3px solid rgba(248, 234, 209, .74);
  border-radius: 50%;
  background:
    radial-gradient(circle at 40% 30%, rgba(255,255,255,.32) 0 17%, transparent 18%),
    linear-gradient(145deg, var(--companion-color), #171f18);
  color: #17241d;
  font-size: 17px;
  font-weight: 900;
  line-height: 1;
}

.companion-skill-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.companion-skill b,
.companion-skill em {
  display: block;
  max-width: 54px;
  overflow: hidden;
  line-height: 1;
  text-align: center;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.companion-skill b {
  font-size: 11px;
  font-weight: 900;
}

.companion-skill em {
  color: #ffe36a;
  font-size: 9px;
  font-style: normal;
  font-weight: 900;
}

.companion-skill.is-ready {
  transform: translateY(-2px);
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .3), 0 6px 0 rgba(0, 0, 0, .3), 0 0 14px color-mix(in srgb, var(--companion-color) 55%, transparent);
}

.companion-skill:disabled {
  cursor: default;
  filter: grayscale(.34);
  opacity: .7;
}

.bars {
  position: absolute;
  left: 50%;
  bottom: max(18px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: 54px minmax(0, 1fr);
  gap: 0;
  width: min(760px, calc(100vw - 36px));
  transform: translateX(-50%);
  align-items: center;
}

.bar {
  height: 28px;
  overflow: hidden;
  border: 4px solid var(--outline);
  border-radius: 0 12px 12px 0;
  background: rgba(23, 31, 24, 0.82);
  box-shadow: 0 4px 0 rgba(0, 0, 0, .26);
}

.bar-fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  transition: width 0.14s linear;
}

#hpFill { background: linear-gradient(90deg, #ff5f58, #ffb15d); }
#xpFill { background: linear-gradient(90deg, #39a8ff, #36e0d4); }

.exp-badge {
  display: grid;
  height: 38px;
  border: 4px solid var(--outline);
  border-radius: 16px 0 0 16px;
  background: #24445e;
  color: #f8ead1;
  font-size: 13px;
  font-weight: 900;
  place-items: center;
  box-shadow: 0 4px 0 rgba(0, 0, 0, .26);
}

.joystick {
  position: absolute;
  left: max(22px, env(safe-area-inset-left));
  bottom: max(92px, env(safe-area-inset-bottom));
  width: 122px;
  height: 122px;
  border: 5px solid rgba(248, 234, 209, .36);
  border-radius: 50%;
  background: rgba(12, 20, 16, .2);
  pointer-events: none;
}

.joystick i {
  position: absolute;
  inset: 32px;
  border: 4px solid rgba(23,31,24,.58);
  border-radius: 50%;
  background: rgba(248, 234, 209, .2);
}

.actions {
  position: absolute;
  right: max(12px, env(safe-area-inset-right));
  top: max(92px, env(safe-area-inset-top));
  display: grid;
  gap: 10px;
  transform: none;
  pointer-events: auto;
}

.action-button {
  display: grid;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  color: #fff6d6;
  cursor: pointer;
  font-size: 16px;
  font-weight: 900;
  place-items: center;
}

.action-button:active {
  transform: translateY(1px);
}

#returnButton,
#restartButton {
  display: none;
}

.status {
  position: absolute;
  left: 50%;
  top: 50%;
  max-width: min(420px, calc(100vw - 32px));
  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel-strong);
  box-shadow: 0 20px 50px var(--shadow);
  color: var(--ink-soft);
  font-size: 13px;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.level-modal {
  position: absolute;
  inset: 0;
  z-index: 36;
  display: none;
  align-items: center;
  justify-content: center;
  padding:
    max(var(--level-modal-pad-top), env(safe-area-inset-top))
    var(--level-modal-pad-x)
    max(var(--level-modal-pad-bottom), calc(76px + env(safe-area-inset-bottom)));
  background: rgba(9, 16, 13, 0.56);
  backdrop-filter: blur(1px);
  pointer-events: auto;
}

.level-modal.is-open {
  display: flex;
}

.level-panel {
  position: relative;
  width: var(--level-panel-width);
  max-height: var(--level-panel-max-height);
  overflow: visible;
  border: var(--level-panel-outline) solid var(--outline);
  border-radius: var(--level-panel-radius);
  background:
    linear-gradient(180deg, rgba(255, 247, 206, .96), rgba(244, 223, 177, .98) 42%, rgba(210, 156, 82, .96) 100%);
  box-shadow:
    inset 0 4px 0 rgba(255, 255, 255, .48),
    inset 0 -5px 0 rgba(96, 61, 28, .28),
    0 6px 0 rgba(0, 0, 0, .42),
    0 24px 64px rgba(0, 0, 0, .46);
  color: var(--outline);
  animation: levelPanelIn 180ms ease-out both;
}

.level-frame-ornament {
  position: absolute;
  z-index: 2;
  display: block;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;
  pointer-events: none;
}

.level-frame-crest {
  top: -56px;
  left: 50%;
  width: var(--level-frame-crest-width);
  height: var(--level-frame-crest-height);
  background-image: url("./assets/ninja2/ui/level-choice/frame_crest.png?v=ninja2-level-frame1");
  transform: translateX(-50%);
}

.level-frame-corner {
  width: var(--level-frame-corner-size);
  height: var(--level-frame-corner-size);
  background-image: url("./assets/ninja2/ui/level-choice/frame_corner_leaf.png?v=ninja2-level-frame1");
}

.level-frame-corner-tl {
  top: -24px;
  left: -24px;
}

.level-frame-corner-tr {
  top: -24px;
  right: -24px;
  transform: scaleX(-1);
}

.level-frame-corner-bl {
  bottom: -24px;
  left: -24px;
  transform: scaleY(-1);
}

.level-frame-corner-br {
  right: -24px;
  bottom: -24px;
  transform: scale(-1, -1);
}

.level-head {
  position: relative;
  z-index: 3;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: start;
  gap: var(--level-head-gap);
  padding:
    var(--level-head-pad-top)
    var(--level-head-pad-x)
    var(--level-head-pad-bottom);
  border-bottom: 4px solid rgba(23, 31, 24, .18);
}

.level-title {
  color: var(--outline);
  font-size: 34px;
  font-weight: 900;
  line-height: .95;
  text-shadow: 0 3px 0 rgba(255, 255, 255, .52);
}

.level-subtitle {
  margin-top: 5px;
  color: rgba(23, 31, 24, .72);
  font-size: 12px;
  font-weight: 800;
  line-height: 1.25;
}

.level-summary {
  min-width: 92px;
  margin-top: 2px;
  padding: 6px 8px;
  border: 3px solid var(--outline);
  border-radius: 8px;
  background: rgba(27, 24, 19, .9);
  color: #fff1c8;
  font-size: 10px;
  font-weight: 900;
  text-align: center;
  box-shadow: inset 0 2px 0 rgba(255, 246, 214, .16), 0 3px 0 rgba(0,0,0,.25);
}

.choice-grid {
  position: relative;
  z-index: 3;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--level-grid-gap);
  padding:
    var(--level-grid-pad-top)
    var(--level-grid-pad-x)
    var(--level-grid-pad-bottom);
}

.choice {
  position: relative;
  display: grid;
  grid-template-rows: auto auto auto auto minmax(0, auto) auto auto;
  justify-items: center;
  min-height: var(--level-card-min-height);
  min-width: 0;
  padding:
    var(--level-card-pad-top)
    var(--level-card-pad-x)
    var(--level-card-pad-bottom);
  overflow: hidden;
  border: var(--level-card-outline) solid var(--outline);
  border-radius: var(--level-card-radius);
  background:
    linear-gradient(180deg, rgba(255, 246, 214, .96), rgba(241, 206, 142, .94) 54%, rgba(102, 73, 43, .94) 100%);
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,.46),
    inset 0 -4px 0 rgba(0,0,0,.2),
    0 4px 0 rgba(0,0,0,.32);
  color: var(--outline);
  cursor: pointer;
  text-align: center;
  animation: choiceRise 190ms ease-out both;
}

.choice:nth-child(2) { animation-delay: 35ms; }
.choice:nth-child(3) { animation-delay: 70ms; }

.choice::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 19%, color-mix(in srgb, var(--choice-color), transparent 48%), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,.2), transparent 42%);
  opacity: .82;
  pointer-events: none;
}

.choice::after {
  content: "";
  position: absolute;
  inset: 6px;
  border-radius: 5px;
  border: 2px solid rgba(255, 198, 74, 0);
  pointer-events: none;
}

.choice:focus-visible,
.choice:hover,
.choice.is-selected {
  outline: none;
  border-color: #ffc64a;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,.55),
    inset 0 -4px 0 rgba(0,0,0,.2),
    0 0 0 4px rgba(255, 198, 74, .28),
    0 5px 0 rgba(0,0,0,.36);
  transform: translateY(-2px);
}

.choice.is-selected::after {
  border-color: rgba(255, 246, 214, .88);
  box-shadow: 0 0 18px rgba(255, 198, 74, .72);
}

.choice:disabled {
  cursor: default;
}

.choice:disabled:not(.is-selected) {
  opacity: .62;
}

.choice-badge,
.choice-icon,
.choice-name,
.choice-pips,
.choice-desc,
.choice-chips,
.choice-category {
  position: relative;
  z-index: 1;
}

.choice-badge {
  justify-self: start;
  min-width: var(--level-badge-min-width);
  padding: var(--level-badge-pad-y) var(--level-badge-pad-x);
  border: var(--level-badge-outline) solid var(--outline);
  border-radius: 999px;
  background: #ffc64a;
  color: var(--outline);
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
  box-shadow: 0 2px 0 rgba(0,0,0,.28);
}

.choice-icon {
  display: inline-flex;
  width: var(--level-icon-size);
  height: var(--level-icon-size);
  margin-top: 7px;
  align-items: center;
  justify-content: center;
  border: var(--level-icon-outline) solid var(--outline);
  border-radius: 50%;
  background:
    radial-gradient(circle at 40% 30%, rgba(255,255,255,.42), transparent 20%),
    radial-gradient(circle at 50% 52%, color-mix(in srgb, var(--choice-color), transparent 10%), #241b16 72%);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.24), 0 4px 0 rgba(0,0,0,.32);
  color: #171f18;
  font-size: 23px;
  font-weight: 900;
  line-height: 1;
}

.choice-icon-img {
  display: block;
  width: 118%;
  height: 118%;
  object-fit: contain;
}

.choice-name {
  display: -webkit-box;
  min-height: var(--level-name-min-height);
  margin-top: 8px;
  overflow: hidden;
  color: var(--outline);
  font-size: var(--level-name-font-size);
  font-weight: 900;
  line-height: 1.12;
  text-shadow: 0 2px 0 rgba(255, 246, 214, .48);
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.choice-pips {
  display: flex;
  gap: 4px;
  margin-top: 7px;
}

.choice-pips i {
  width: 9px;
  height: 9px;
  border: 2px solid var(--outline);
  background: rgba(59, 40, 24, .5);
  transform: rotate(45deg);
}

.choice-pips i.is-filled {
  background: #ffc64a;
  box-shadow: 0 0 7px rgba(255, 198, 74, .72);
}

.choice-desc {
  display: -webkit-box;
  min-height: var(--level-desc-min-height);
  margin-top: 9px;
  overflow: hidden;
  color: rgba(23, 31, 24, .78);
  font-size: 12px;
  font-weight: 800;
  line-height: 1.32;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.choice-chips {
  display: grid;
  width: 100%;
  grid-template-columns: 1fr;
  gap: 4px;
  margin-top: 8px;
}

.choice-chip,
.choice-category {
  overflow: hidden;
  border: 2px solid rgba(23, 31, 24, .88);
  background: rgba(27, 24, 19, .9);
  color: #fff1c8;
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.choice-chip {
  min-width: 0;
  padding: 5px 4px;
  border-radius: 7px;
}

.choice-category {
  min-width: 54px;
  margin-top: 7px;
  padding: 5px 8px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--choice-accent), #171f18 68%);
}

@keyframes levelPanelIn {
  from { opacity: 0; transform: scale(.96) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes choiceRise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

      <div class="timer">
        <div class="timer-title" id="phaseText">Stage 1</div>
        <div class="timer-value" id="timeText">00:00</div>
      </div>
      <div class="resource-ledger" id="resourceLedger" aria-label="run resource gains">
        <div class="ledger-row ledger-wood" data-resource="wood"><span class="ledger-icon"></span><b class="ledger-value">0</b><em class="ledger-gain">+1</em></div>
        <div class="ledger-row ledger-stone" data-resource="stone"><span class="ledger-icon"></span><b class="ledger-value">0</b><em class="ledger-gain">+1</em></div>
        <div class="ledger-row ledger-souls" data-resource="souls"><span class="ledger-icon"></span><b class="ledger-value">0</b><em class="ledger-gain">+1</em></div>
        <div class="ledger-row ledger-gold" data-resource="gold"><span class="ledger-icon"></span><b class="ledger-value">0</b><em class="ledger-gain">+1</em></div>
      </div>
      <button class="action-button hud-pause-button" id="pauseButton" type="button" title="Pause">II</button>
      <div class="stage-track" id="stageTrack" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><b>B</b>
      </div>
    </div>

    <div class="battle-objective" aria-live="polite">
      <strong id="objectiveText">대나무 숲 정화</strong>
      <span><i class="counter-icon counter-enemy" aria-hidden="true"></i>적 <b id="enemyText">0</b></span>
      <span><i class="counter-icon counter-pickup" aria-hidden="true"></i>픽업 <b id="pickupText">0</b></span>
    </div>

    <div class="companion-skill-dock" id="companionSkillDock" aria-label="동료 스킬"></div>

    <div class="bars">
      <div class="exp-badge">EXP</div>
      <div class="bar exp-bar"><div class="bar-fill" id="xpFill"></div></div>
    </div>

    <div class="joystick" aria-hidden="true"><i></i></div>
  </div>

  <div class="actions">
    <button class="action-button" id="returnButton" type="button" title="Return">↩</button>
    <button class="action-button" id="restartButton" type="button" title="Reset">R</button>
  </div>

  <div class="level-modal" id="levelModal" role="dialog" aria-modal="true" aria-labelledby="levelTitle" aria-describedby="levelSubtitle">
    <section class="level-panel">
      <span class="level-frame-ornament level-frame-crest" aria-hidden="true"></span>
      <span class="level-frame-ornament level-frame-corner level-frame-corner-tl" aria-hidden="true"></span>
      <span class="level-frame-ornament level-frame-corner level-frame-corner-tr" aria-hidden="true"></span>
      <span class="level-frame-ornament level-frame-corner level-frame-corner-bl" aria-hidden="true"></span>
      <span class="level-frame-ornament level-frame-corner level-frame-corner-br" aria-hidden="true"></span>
      <div class="level-head">
        <div>
          <div class="level-title" id="levelTitle">성장 선택</div>
          <div class="level-subtitle" id="levelSubtitle">Lv 2</div>
        </div>
        <div class="level-summary" id="runSummary">0 처치</div>
      </div>
      <div class="choice-grid" id="choiceGrid"></div>
    </section>
  </div>

  <div class="status" id="bootStatus">Loading</div>

  <section class="result-screen" id="resultScreen" aria-label="expedition result">
    <div class="result-card">
      <h2 id="resultTitle">안개 정화 성공</h2>
      <p id="resultSummary">원정대가 영혼불을 가져왔습니다.</p>
      <div class="result-rewards" id="resultRewards"></div>
      <button class="result-return" id="resultReturnButton" type="button">성소로 귀환</button>
    </div>
  </section>
</main>
<script type="module" src="./src/survivor/survivor-app.js?v=ninja2-shrine-production1"></script>
</body>
</html>
