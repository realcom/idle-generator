<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mushroomer Phaser Client</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/dist/protobuf.min.js"></script>
<script src="vendor/spine-webgl.min.js"></script>
<style>
:root {
  --bg: #112719;
  --wood-dark: #321708;
  --wood: #6f3513;
  --wood-light: #a65a1d;
  --ink: #2b1206;
  --line: #211005;
  --cream: #fff1c8;
  --parchment: #f7d999;
  --gold: #f5ad25;
  --gold-2: #ffe26c;
  --green: #72c843;
  --green-dark: #2f7e20;
  --red: #f05a42;
  --purple: #a967ff;
  --text: #fff7dd;
  --btn-stroke: #2a1307;
  --btn-rim: #7a3c12;
  --btn-shadow: rgba(26, 10, 2, .62);
  --btn-cream: #fff5cf;
  --btn-gold-top: #ffd65d;
  --btn-gold-mid: #f4a326;
  --btn-gold-low: #cf6f12;
  --btn-green-top: #abea62;
  --btn-green-mid: #62bd37;
  --btn-green-low: #2f7d23;
  --map-sky-color: #a3df9b;
  --map-sky-image: url("assets/maps/meadow_day/sky.png");
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(128, 83, 45, .72), transparent 46%),
    linear-gradient(90deg, #2b170d, #5a3825 18%, #3a2114 50%, #5a3825 82%, #2b170d);
  color: var(--text);
}
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  letter-spacing: 0;
}
button {
  appearance: none;
  border: 0;
  color: inherit;
  font: inherit;
}
button.side-button,
button.tab,
.reward-button,
.auto-button {
  cursor: pointer;
}
.app {
  position: relative;
  width: min(100%, 420px);
  min-height: 100dvh;
  margin: 0 auto;
  padding: 6px 8px 0;
  display: grid;
  gap: 5px;
  align-content: start;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(48, 27, 15, .46) 0 8px, transparent 8px calc(100% - 8px), rgba(48, 27, 15, .46) calc(100% - 8px)),
    linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 12%),
    var(--map-sky-image) center -72px / 156% auto no-repeat,
    linear-gradient(180deg, var(--map-sky-color) 0 26%, #7acb66 26% 55%, #102719 55% 100%);
  box-shadow:
    inset 0 0 0 5px rgba(43, 23, 13, .52),
    inset 0 0 0 1px rgba(255, 219, 137, .14);
}
.top-hud {
  position: relative;
  z-index: 20;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 132px;
  gap: 6px;
}
.profile-card,
.currency-card,
.wood-button,
.stage-banner,
.growth-dock,
.stat-card,
.mission-card,
.side-button {
  border: 4px solid var(--line);
  box-shadow: inset 0 3px 0 rgba(255, 229, 154, .28), 0 4px 0 rgba(0, 0, 0, .28);
}
.profile-card {
  min-width: 0;
  min-height: 56px;
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr);
  gap: 7px;
  align-items: center;
  padding: 5px 9px 5px 5px;
  border-radius: 22px;
  background: linear-gradient(#5a2b11, #2d1508);
}
.portrait {
  width: 46px;
  height: 46px;
  position: relative;
  border: 5px solid #170a04;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 30%, #ffe585 0 22%, #f4a829 54%, #9a5319 100%);
}
.portrait::before,
.portrait::after {
  content: "";
  position: absolute;
  top: 12px;
  width: 8px;
  height: 13px;
  border-radius: 50%;
  background: #2d1207;
}
.portrait::before { left: 14px; }
.portrait::after { right: 14px; }
.portrait-muzzle {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 9px;
  height: 14px;
  border-radius: 50%;
  background: #fff1c8;
}
.profile-copy { min-width: 0; }
.hero-name {
  margin: 0;
  font-size: 15px;
  line-height: 1.05;
  font-weight: 900;
  color: #fff7dd;
  text-shadow: 0 2px 0 #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hero-level {
  margin-top: 2px;
  color: #ffe66f;
  font-size: 13px;
  font-weight: 900;
  text-shadow: 0 2px 0 #000;
}
.xp-track,
.wave-track {
  overflow: hidden;
  background: #1b0c05;
  border: 2px solid #120802;
}
.xp-track {
  height: 11px;
  margin-top: 3px;
  border-radius: 999px;
}
.xp-fill,
.wave-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff9f18, #ffe45c);
  box-shadow: inset 0 2px 0 rgba(255, 255, 255, .35);
}
.xp-fill { width: 65%; }
.currency-stack {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 36px;
  grid-template-rows: repeat(2, 1fr);
  gap: 5px;
}
.currency-card {
  grid-column: 1;
  min-width: 0;
  height: 25px;
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) 15px;
  align-items: center;
  gap: 4px;
  padding: 2px 5px 2px 2px;
  border-radius: 12px;
  background: linear-gradient(#4c220e, #241006);
}
.coin-icon,
.gem-icon,
.mini-coin,
.card-icon {
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
  border: 3px solid #7b3c0c;
  background: radial-gradient(circle at 34% 28%, #fff7a9, #ffbd2d 55%, #cb6d13 100%);
  color: var(--ink);
  font-weight: 900;
}
.coin-icon,
.coin-icon,
.gem-icon { width: 22px; height: 22px; font-size: 11px; }
.gem-icon {
  border-radius: 9px;
  border-color: #53208d;
  background: linear-gradient(135deg, #f0bbff, var(--purple) 55%, #6627bb);
  color: white;
}
.currency-value {
  min-width: 0;
  font-size: 14px;
  line-height: 1;
  font-weight: 900;
  text-shadow: 0 2px 0 #000;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.plus-dot {
  width: 15px;
  height: 15px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: #2b1206;
  color: #ffd670;
  font-size: 12px;
  line-height: 1;
}
.wood-button {
  grid-column: 2;
  grid-row: 1 / span 2;
  width: 36px;
  height: 55px;
  border-radius: 15px;
  background: linear-gradient(#8c4819, #401d0b);
  color: #fff3ce;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  text-shadow: 0 2px 0 #000;
}
.stage-banner {
  position: relative;
  z-index: 17;
  width: min(52%, 220px);
  display: grid;
  grid-template-columns: 1fr;
  gap: 3px;
  justify-self: center;
  padding: 5px 10px 6px;
  margin: 4px auto -34px;
  border: 3px solid #281004;
  border-radius: 16px;
  box-shadow: inset 0 2px 0 rgba(255, 219, 131, .2), 0 3px 0 rgba(0, 0, 0, .24);
  background:
    linear-gradient(180deg, rgba(255, 206, 111, .16), transparent 30%),
    linear-gradient(#7c3e17, #361608);
  text-align: center;
}
.stage-title-row {
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
}
.stage-name {
  min-width: 0;
  font-size: 11px;
  line-height: 1;
  font-weight: 900;
  text-shadow: 0 3px 0 #000;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stage-code {
  color: #ffd36a;
  font-size: 15px;
  font-weight: 950;
  line-height: 1;
  text-shadow: 0 3px 0 #000;
}
.wave-label {
  color: #fff4cf;
  font-size: 9px;
  font-weight: 900;
  text-shadow: 0 2px 0 #000;
}
#bootStatus { color: #c8fff2; }
#bootStatus.is-error { color: #ffad95; }
.wave-track {
  height: 6px;
  border-radius: 999px;
}
.wave-fill { width: 0%; }
.combat-shell {
  position: relative;
  z-index: 5;
  height: clamp(330px, 42dvh, 370px);
  min-height: 0;
  isolation: isolate;
}
.stage-frame {
  position: relative;
  height: 100%;
  width: 100%;
  border: 0;
  border-radius: 12px 12px 14px 14px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 24%, rgba(13, 42, 23, .16) 80%, rgba(8, 31, 17, .42)),
    url("assets/maps/meadow_day/near.png") center bottom / 128% auto no-repeat,
    url("assets/maps/meadow_day/mid.png") center 56% / 118% auto no-repeat,
    url("assets/maps/meadow_day/far.png") center 28% / 112% auto no-repeat,
    var(--map-sky-image) center top / 128% auto no-repeat,
    linear-gradient(180deg, var(--map-sky-color) 0%, var(--map-sky-color) 30%, #c6ed9d 31%, #d9ec7d 54%, #83c85a 70%, #2f6737 100%);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, .22),
    0 6px 0 rgba(0, 0, 0, .22);
}
.combat-shell.is-splashing .stage-frame {
  z-index: 60;
}
.combat-shell.is-splashing .side-stack,
.combat-shell.is-splashing .mission-card,
.combat-shell.is-splashing .event-feed {
  opacity: 0;
  pointer-events: none;
}
.stage-frame::before {
  content: "";
  position: absolute;
  left: -6%;
  right: -6%;
  bottom: 3%;
  z-index: 0;
  height: 22%;
  pointer-events: none;
  border-top: 5px solid rgba(77, 45, 22, .72);
  background:
    linear-gradient(180deg, rgba(255, 218, 118, .14), transparent 30%),
    repeating-linear-gradient(88deg, transparent 0 58px, rgba(78, 44, 21, .36) 60px 64px),
    linear-gradient(#ba7b38 0%, #935728 64%, #61341b 100%);
  box-shadow:
    inset 0 6px 0 rgba(255, 218, 129, .2),
    0 -5px 0 rgba(72, 119, 43, .7);
}
.stage-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  box-shadow:
    inset 0 -34px 28px rgba(5, 31, 16, .28),
    inset 0 1px 0 rgba(255, 255, 255, .18);
}
#gameStage {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
}
#gameStage canvas {
  width: 100%;
  height: 100%;
  display: block;
}
#spineCanvas {
  position: absolute;
  inset: 0;
  z-index: 2;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.mission-card {
  position: absolute;
  right: 54px;
  top: 104px;
  z-index: 8;
  width: min(34%, 138px);
  padding: 8px 8px;
  border-radius: 13px;
  background: linear-gradient(#fff7da, #f4d190);
  color: var(--ink);
  text-align: center;
}
.mission-title {
  font-size: 13px;
  line-height: 1;
  font-weight: 950;
}
.mission-copy {
  margin-top: 4px;
  font-size: 10px;
  font-weight: 850;
}
.reward-mini-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 5px;
  font-size: 11px;
  font-weight: 950;
}
.side-stack {
  position: absolute;
  z-index: 9;
  display: grid;
  gap: 6px;
}
.side-stack.left { left: 7px; top: 86px; }
.side-stack.right { right: 6px; top: 38px; bottom: auto; }
.side-button {
  width: 46px;
  min-height: 48px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: linear-gradient(#9b5420, #4a210c);
  color: #fff4cf;
  font-size: 9px;
  font-weight: 900;
  text-shadow: 0 2px 0 #000;
}
.side-button .symbol {
  display: block;
  font-size: 17px;
  line-height: 1;
}
.growth-dock {
  position: relative;
  z-index: 15;
  margin-top: -4px;
  border-radius: 18px;
  background:
    linear-gradient(90deg, rgba(255, 210, 110, .12), transparent 18% 82%, rgba(255, 210, 110, .12)),
    linear-gradient(#8a4618 0, #642d10 34%, #3c1a0a 100%);
  padding: 5px 7px 6px;
}
.dock-status {
  height: 32px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
  gap: 5px;
  margin-bottom: 6px;
}
.dock-stat {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: 3px solid rgba(34, 14, 5, .9);
  border-radius: 12px;
  background: linear-gradient(#5b2a0e, #331507);
  font-weight: 950;
  text-shadow: 0 2px 0 #000;
  overflow: hidden;
}
.dock-stat b {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 5px;
}
.stat-card {
  position: relative;
  min-height: 124px;
  display: grid;
  grid-template-rows: 16px 38px 24px 18px;
  justify-items: center;
  align-items: center;
  border-radius: 14px;
  background: linear-gradient(#fff5d5, var(--parchment));
  color: var(--ink);
  padding: 6px 5px 33px;
  text-align: center;
  overflow: hidden;
}
.stat-card::before {
  content: "";
  position: absolute;
  left: -22px;
  top: -25px;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  background: rgba(255, 255, 255, .3);
}
.card-level {
  position: relative;
  left: auto;
  top: auto;
  z-index: 1;
  width: 100%;
  text-align: center;
  font-size: 10px;
  font-weight: 950;
}
.card-icon {
  position: relative;
  left: auto;
  top: auto;
  z-index: 1;
  width: 38px;
  height: 38px;
  font-size: 18px;
}
.stat-name {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  min-height: 23px;
  font-size: 10px;
  line-height: 1.1;
  font-weight: 950;
}
.stat-value {
  position: relative;
  z-index: 1;
  margin-top: 0;
  font-size: 13px;
  line-height: 1;
  font-weight: 950;
}
.upgrade-button {
  position: absolute;
  left: 5px;
  right: 5px;
  bottom: 7px;
  min-height: 27px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: 3px solid #2a5c14;
  border-radius: 999px;
  background: linear-gradient(#a4e75a, #4b9b2c);
  color: white;
  font-size: 11px;
  font-weight: 950;
  text-shadow: 0 2px 0 #143308;
}
.mini-coin {
  width: 14px;
  height: 14px;
  border-width: 2px;
}
.reward-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 88px;
  gap: 6px;
  margin-top: 6px;
}
.reward-button,
.auto-button {
  min-height: 56px;
  border: 4px solid var(--line);
  border-radius: 15px;
  box-shadow: inset 0 4px 0 rgba(255, 255, 255, .24), 0 4px 0 rgba(0, 0, 0, .24);
  color: white;
  font-weight: 950;
  text-shadow: 0 3px 0 rgba(0, 0, 0, .5);
}
.reward-button {
  display: grid;
  grid-template-columns: 50px minmax(0, 1fr);
  align-items: center;
  padding: 5px 9px 5px 5px;
  background: linear-gradient(#ffc64d, #ef8d19);
  font-size: 16px;
  line-height: 1.05;
}
.reward-button small {
  display: block;
  margin-top: 3px;
  color: #fff8d8;
  font-size: 13px;
}
.auto-button {
  display: grid;
  place-items: center;
  padding: 6px;
  background: linear-gradient(#7bce4c, #2d8324);
  font-size: 12px;
  line-height: 1.15;
}
.tabs {
  height: 44px;
  margin-top: 6px;
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  border: 4px solid var(--line);
  border-radius: 14px;
  background: #2b1307;
}
.tab {
  min-width: 0;
  display: grid;
  place-items: center;
  border-radius: 10px;
  background: linear-gradient(#5a2a10, #321708);
  color: #f7d9a3;
  font-size: 9px;
  font-weight: 950;
  text-align: center;
  text-shadow: 0 2px 0 #000;
}
.tab.active {
  background: linear-gradient(#ffc13e, #ca7419);
  color: #fff6d7;
}
.tab .tab-icon {
  display: block;
  font-size: 14px;
  line-height: 1;
}
.currency-card,
.wood-button,
.side-button,
.upgrade-button,
.reward-button,
.auto-button,
.tab,
.dock-stat {
  position: relative;
  isolation: isolate;
}
.currency-card,
.wood-button,
.side-button,
.reward-button,
.auto-button,
.tab {
  border-color: var(--btn-stroke);
  box-shadow:
    inset 0 3px 0 rgba(255, 232, 151, .34),
    inset 0 -4px 0 rgba(58, 22, 4, .42),
    0 4px 0 var(--btn-shadow);
}
.currency-card::before,
.wood-button::before,
.side-button::before,
.reward-button::before,
.auto-button::before,
.tab::before,
.upgrade-button::before {
  content: "";
  position: absolute;
  z-index: -1;
  pointer-events: none;
  border-radius: inherit;
}
.currency-card::before,
.wood-button::before,
.side-button::before,
.reward-button::before,
.auto-button::before,
.tab::before {
  left: 5px;
  right: 5px;
  top: 4px;
  height: 36%;
  background: linear-gradient(rgba(255, 240, 177, .38), rgba(255, 240, 177, .05));
}
.currency-card {
  height: 27px;
  grid-template-columns: 24px minmax(0, 1fr) 19px;
  border-width: 3px;
  border-radius: 999px;
  padding: 1px 4px 2px 1px;
  background: linear-gradient(#784117 0%, #4a210b 54%, #241005 100%);
}
.currency-card > * {
  position: relative;
  z-index: 1;
}
.plus-dot {
  width: 19px;
  height: 19px;
  border: 3px solid #522408;
  background: radial-gradient(circle at 35% 28%, #ffe68d, #c66c15 68%, #71320c);
  box-shadow: inset 0 2px 0 rgba(255, 245, 182, .42), 0 1px 0 rgba(0, 0, 0, .35);
  color: #fff1a2;
  font-size: 13px;
  text-shadow: 0 1px 0 #321307;
}
.wood-button,
.side-button {
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(255, 218, 120, .12), transparent 28% 72%, rgba(255, 218, 120, .08)),
    linear-gradient(#a8642a 0%, #764015 48%, #3f1b08 100%);
}
.wood-button:active,
.side-button:active,
.reward-button:active,
.auto-button:active,
.tab:active,
.upgrade-button:active {
  transform: translateY(2px);
  box-shadow:
    inset 0 2px 0 rgba(255, 232, 151, .2),
    inset 0 -2px 0 rgba(58, 22, 4, .5),
    0 2px 0 var(--btn-shadow);
}
.side-button {
  border-width: 4px;
  border-radius: 18px;
  color: #fff3cf;
}
.side-button > span {
  position: relative;
  z-index: 1;
  display: grid;
  justify-items: center;
  gap: 2px;
}
.side-button .symbol {
  display: block;
  width: auto;
  height: 22px;
  margin: 0 auto 1px;
  color: #fff2cf;
  font-size: 21px;
  line-height: 1;
  text-shadow: 0 2px 0 #2a1005, 0 0 1px #2a1005;
}
.side-button.is-alert::after {
  content: "!";
  position: absolute;
  right: -7px;
  top: -8px;
  z-index: 2;
  width: 20px;
  height: 20px;
  display: grid;
  place-items: center;
  border: 3px solid #5d210b;
  border-radius: 50%;
  background: linear-gradient(#ff7b62, #c52e24);
  color: white;
  font-size: 13px;
  font-weight: 950;
  box-shadow: 0 2px 0 rgba(0, 0, 0, .35);
}
.upgrade-button {
  overflow: hidden;
  border: 3px solid #214d10;
  background:
    linear-gradient(90deg, rgba(255, 245, 157, .22), transparent 22% 78%, rgba(28, 88, 20, .18)),
    linear-gradient(var(--btn-green-top), var(--btn-green-mid) 52%, var(--btn-green-low));
  box-shadow:
    inset 0 3px 0 rgba(245, 255, 190, .48),
    inset 0 -5px 0 rgba(18, 77, 14, .55),
    0 3px 0 rgba(21, 47, 9, .55);
}
.upgrade-button::before {
  left: 8px;
  right: 8px;
  top: 3px;
  height: 35%;
  background: linear-gradient(rgba(255, 255, 209, .38), transparent);
}
.upgrade-button > * {
  position: relative;
  z-index: 1;
}
.reward-row {
  grid-template-columns: minmax(0, 1fr) 88px;
  align-items: stretch;
}
.reward-button {
  min-height: 56px;

.reward-medal {

  height: 47px;

.reward-copy {

.reward-label {

.reward-button small {

.auto-button {

.auto-icon {

  font-size: 20px;
  line-height: 1;
}
.tabs {

}
.tab {

}
.tab.active {

.tab .tab-icon {

}
.tab.active .tab-icon {
  background: rgba(255, 246, 204, .92);
  color: #70300c;
  box-shadow: 0 2px 0 rgba(67, 25, 5, .28);
}
.currency-card,
.wood-button,
.side-button,
.upgrade-button,
.reward-button,
.auto-button,
.tab {

}
.currency-card::before,
.wood-button::before,
.side-button::before,
.upgrade-button::before,
.reward-button::before,
.auto-button::before,

}

}

}
.side-button {

}
.side-button .symbol {

}
.upgrade-button {
  min-height: 26px;
  border: 0;
  background-image: url("assets/ui/buttons/btn_upgrade_green.png");
  box-shadow: none;
}
.reward-button {
  min-height: 58px;
  border: 0;
  background-image: url("assets/ui/buttons/btn_reward_gold.png");
  box-shadow: none;
}
.reward-button:active {
  background-image: url("assets/ui/buttons/btn_reward_gold_pressed.png");
}
.auto-button {

  box-shadow: none;
}
.portrait {

  box-shadow: inset 0 4px 0 rgba(255, 239, 155, .4), 0 3px 0 rgba(21, 7, 2, .32);

.portrait::before {
  content: "";
  position: absolute;

.reward-medal .portrait::before {
  inset: 4px;
}
.coin-icon,
.gem-icon,
.plus-dot,
.wood-button .restart-icon {
  display: inline-block;
  background-color: transparent;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;

  color: transparent;
  font-size: 0;
  line-height: 0;
  text-shadow: none;
}
.coin-icon {
  width: 25px;
  height: 25px;
  background-image: url("assets/ui/icons/icon_top_coin.png");
}
.gem-icon {
  width: 25px;
  height: 25px;
  border-radius: 0;
  background-image: url("assets/ui/icons/icon_top_gem.png");
}
.plus-dot {
  width: 20px;
  height: 20px;
  background-image: url("assets/ui/icons/icon_top_plus.png");
}
.wood-button {
  display: grid;

}
.wood-button .restart-icon {

.top-hud {
  grid-template-columns: minmax(0, 1fr) 140px;

  align-items: start;
}

    linear-gradient(180deg, rgba(255, 204, 105, .2), transparent 26%),

.portrait {

  height: 58px;
  border: 5px solid #221005;

    radial-gradient(circle at 34% 25%, #fff2a0 0 16%, #ffc13f 49%, #d47b17 73%, #6d2c0c 100%);

}

  gap: 2px;

  border: 3px solid #2a1004;
  border-radius: 999px;

.top-hud .currency-card::before {

  right: 31px;

.top-hud .currency-card > * {

}
.top-hud .currency-value {

}
.top-hud .coin-icon,
.top-hud .gem-icon {

}
.top-hud .plus-dot {

}
.top-hud .wood-button {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  width: 42px;
  height: 67px;

  border-radius: 19px;
  background:
    linear-gradient(90deg, rgba(255, 205, 98, .18), transparent 34% 68%, rgba(255, 221, 119, .1)),
    linear-gradient(#9c561f 0%, #6d3410 52%, #351205 100%);
  box-shadow:
    inset 0 4px 0 rgba(255, 219, 121, .34),
    inset 0 -4px 0 rgba(35, 11, 2, .48),
    0 4px 0 rgba(25, 8, 2, .42);
}
.top-hud .wood-button::before {
  content: "";

.top-hud .wood-button .restart-icon {

}
.dock-status {

  margin-bottom: 5px;
}
.card-grid {
  gap: 6px;
}
.stat-card {

.card-icon {

}
.stat-name {
  min-height: 21px;
  font-size: 10px;
}
.stat-value {
  font-size: 13px;
}
.upgrade-button {
  min-height: 25px;
  left: 7px;
  right: 7px;
  bottom: 6px;
  border: 2px solid #214d10;
  background-image: none;
  background:
    linear-gradient(180deg, rgba(255, 255, 204, .36), transparent 38%),

  box-shadow:
    inset 0 2px 0 rgba(246, 255, 198, .5),
    inset 0 -3px 0 rgba(19, 74, 12, .52),
    0 2px 0 rgba(19, 49, 8, .52);
}
.reward-row {
  grid-template-columns: minmax(0, 1fr) 84px;
  gap: 7px;
  margin-top: 7px;
}
.reward-button,
.auto-button {
  min-height: 64px;
  border: 4px solid #3b1505;
  box-shadow:
    inset 0 4px 0 rgba(255, 245, 178, .34),
    inset 0 -5px 0 rgba(116, 45, 4, .32),
    0 4px 0 rgba(32, 10, 2, .42);
}
.reward-button {
  grid-template-columns: 54px minmax(0, 1fr);
  gap: 5px;
  padding: 6px 12px 7px 6px;
  border-radius: 22px;
  background-image: none;
  background:
    radial-gradient(circle at 11% 18%, rgba(255, 255, 204, .58) 0 4px, transparent 5px),
    linear-gradient(180deg, rgba(255, 255, 187, .25), transparent 35%),
    linear-gradient(#ffd55a 0%, #f5a828 48%, #df7712 100%);
}
.reward-medal {
  width: 48px;
  height: 48px;
  border-width: 4px;
}
.reward-medal .portrait {
  width: 36px;
  height: 36px;
}
.reward-copy {
  align-content: center;
  gap: 3px;
}
.reward-label {
  font-size: 15px;
  line-height: 1;
}
.reward-button small {
  min-width: 116px;
  min-height: 22px;
  margin-top: 0;
  padding: 2px 12px 3px;
  font-size: 13px;
  background: linear-gradient(#6e340f, #421908);
  box-shadow: inset 0 2px 0 rgba(255, 211, 113, .22);
}
.auto-button {
  padding: 6px 4px;
  border-radius: 20px;
  background-image: none;
  background:
    linear-gradient(180deg, rgba(245, 255, 202, .28), transparent 34%),
    linear-gradient(#a8eb62 0%, #6bc23e 48%, #398b27 100%);
  color: #fffef0;
  font-size: 13px;
  line-height: 1.05;
}
.auto-icon {
  margin-bottom: 2px;
  font-size: 21px;
}
.tabs {
  height: 48px;
  border: 0;
  border-radius: 15px;
  box-shadow: inset 0 3px 0 rgba(255, 207, 113, .14);
  padding: 4px;
  gap: 4px;
  background: linear-gradient(#4b220b 0%, #2d1205 70%, #170804 100%);
}
.tab {
  min-height: 39px;
  padding: 4px 2px 3px;
  border: 2px solid #241005;
  border-radius: 10px;
  background-image: none;
  background:
    linear-gradient(180deg, rgba(255, 198, 95, .18), transparent 36%),
    linear-gradient(#744019 0%, #4b220c 56%, #2d1206 100%);
  color: #fff0c0;
  line-height: .98;
  box-shadow:
    inset 0 2px 0 rgba(255, 205, 105, .25),

}
.tab.active {

  border-color: #4b1b05;
  background-image: none;
  background:
    radial-gradient(circle at 18% 12%, rgba(255, 255, 204, .46) 0 5px, transparent 6px),
    linear-gradient(#ffd75b 0%, #f5a42a 56%, #d77514 100%);
  color: #4b1b05;
  box-shadow:
    inset 0 3px 0 rgba(255, 248, 183, .42),
    inset 0 -3px 0 rgba(151, 70, 8, .34);
  text-shadow: 0 1px 0 rgba(255, 241, 167, .72);
}
.tab:active {
  background-image: none;
}
.tab.active:active {
  transform: translateY(1px);
  background-image: none;
}
.tab-main {
  position: relative;
  z-index: 1;
  display: grid;
  justify-items: center;
  align-content: center;
  gap: 1px;
  transform: none;
}
.tab .tab-icon {
  width: 18px;
  height: 14px;
  margin: 0;
  background: none;
  color: inherit;
  box-shadow: none;
  font-size: 12px;
  line-height: 1;
}
.tab-label {
  display: block;
  min-width: 0;
  font-size: 9px;
  line-height: 1;
  white-space: nowrap;
}
.tab.active .tab-icon {
  background: none;
  color: #5e2608;
  box-shadow: none;
}
.wood-button:active,
.side-button:active,
.reward-button:active,
.auto-button:active,
.tab:active,
.upgrade-button:active {
  transform: translateY(1px);
  box-shadow: none;
}
.message-layer {
  position: fixed;
  top: max(8px, env(safe-area-inset-top));
  left: 50%;
  z-index: 90;
  width: min(404px, calc(100vw - 16px));
  display: grid;
  gap: 7px;
  pointer-events: none;
  transform: translateX(-50%);
}
.modal-stage {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 50%;
  z-index: 100;
  width: min(100vw, 420px);
  height: 100dvh;
  pointer-events: none;
  transform: translateX(-50%);
}
.modal-stage.is-active {
  pointer-events: auto;
}
.modal-stage canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.message-toast {
  min-height: 55px;
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) auto;
  align-items: center;
  gap: 9px;
  padding: 7px 11px 8px 8px;
  border: 3px solid #2a1004;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255, 231, 155, .18), transparent 34%),
    linear-gradient(90deg, rgba(255, 177, 66, .16), transparent 38%),
    linear-gradient(#4f240d 0%, #2a1005 100%);
  box-shadow:
    inset 0 3px 0 rgba(255, 226, 142, .26),
    inset 0 -3px 0 rgba(18, 6, 1, .45),
    0 5px 0 rgba(18, 7, 1, .34),
    0 9px 22px rgba(13, 5, 1, .32);
  color: #fff5ce;
  opacity: 0;
  transform: translateY(-18px) scale(.97);
  transition: opacity 160ms ease, transform 180ms cubic-bezier(.2, .9, .2, 1);
}
.message-toast.is-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.message-toast.is-leaving {
  opacity: 0;
  transform: translateY(-12px) scale(.98);
}
.message-icon {
  width: 40px;
  height: 40px;
  display: grid;
  place-items: center;
  border: 3px solid #180802;
  border-radius: 14px;
  background: radial-gradient(circle at 34% 26%, #fff4a7, #f7ad2f 58%, #8d4212);
  color: #3e1705;
  font-size: 14px;
  font-weight: 950;
  line-height: 1;
  box-shadow: inset 0 3px 0 rgba(255, 250, 197, .42), 0 2px 0 rgba(0, 0, 0, .26);
  text-shadow: 0 1px 0 rgba(255, 240, 174, .58);
}
.message-copy {
  min-width: 0;
  display: grid;
  gap: 2px;
}
.message-title,
.message-body {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.message-title {
  color: #fff2b1;
  font-size: 14px;
  font-weight: 950;
  line-height: 1.05;
  text-shadow: 0 2px 0 #120602;
}
.message-body {
  color: #fff9df;
  font-size: 12px;
  font-weight: 850;
  line-height: 1.1;
  text-shadow: 0 2px 0 #120602;
}
.message-meta {
  align-self: center;
  padding: 3px 6px 4px;
  border-radius: 999px;
  background: rgba(255, 232, 156, .12);
  color: #f4d89a;
  font-size: 10px;
  font-weight: 900;
}
.message-loot .message-icon {
  background: radial-gradient(circle at 34% 26%, #efffe0, #76d64a 58%, #2d7c24);
  color: #103407;
}
.message-currency .message-icon {
  border-radius: 50%;
}
.message-upgrade .message-icon {
  background: radial-gradient(circle at 34% 26%, #f4edff, #a96dff 58%, #622ab5);
  color: #fff9ff;
  text-shadow: 0 2px 0 rgba(31, 8, 68, .58);
}
.message-warning .message-icon {
  background: radial-gradient(circle at 34% 26%, #ffe0c7, #ff7a57 58%, #b92b20);
  color: white;
  text-shadow: 0 2px 0 rgba(73, 14, 8, .58);
}
.message-clear .message-icon {
  background: radial-gradient(circle at 34% 26%, #ecfff8, #45d39b 58%, #157b5d);
  color: #063426;
}
.event-feed {
  position: absolute;
  display: none;
  z-index: 6;
  gap: 4px;
  pointer-events: none;
}
.log-entry {
  min-height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(38, 19, 7, .78);
  color: #fff3c8;
  font-size: 12px;
  font-weight: 850;
  text-shadow: 0 2px 0 #000;
}
.log-loot, .log-clear { color: #ffe165; }
.log-warn { color: #ffb19b; }
.sr-table { display: none; }
@media (max-width: 380px) {
  .app { padding-inline: 7px; }
  .top-hud { grid-template-columns: minmax(0, 1fr) 124px; }
  .hero-name { font-size: 14px; }
  .currency-value { font-size: 13px; }
  .stage-banner { width: min(58%, 206px); }
  .stage-name { font-size: 10px; }
  .stage-code { font-size: 14px; }
  .combat-shell { height: clamp(324px, 42dvh, 362px); }
  .mission-card { width: 38%; }
  .side-button { width: 43px; min-height: 46px; }
  .card-grid { gap: 4px; }

.hud-chip.is-gain,
.top-currency.is-gain,
.xp-hud.is-gain {
  animation: hudResourcePulse 560ms cubic-bezier(.2, .9, .2, 1);
}

.hud-chip.is-gain .hud-value,
.top-currency.is-gain .hud-value,
.xp-hud.is-gain .xp-hud-value {
  animation: hudResourceValue 560ms cubic-bezier(.2, .9, .2, 1);
}

}

@keyframes hudResourcePulse {
  0% { transform: scale(1); filter: brightness(1); }
  36% { transform: scale(1.045); filter: brightness(1.18); }
  100% { transform: scale(1); filter: brightness(1); }
}

@keyframes hudResourceValue {
  0% { color: #fff8df; }
  38% { color: #ffe86d; }
  100% { color: #fff8df; }
}

@keyframes hudGainFloat {
  0% { opacity: 0; transform: translateY(4px) scale(.92); }
  18% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-24px) scale(.96); }
}

  35% { box-shadow: inset 0 2px 0 rgba(255, 255, 255, .56), 0 0 14px rgba(218, 180, 255, .72); }

/* Final visual pass: align borders, spacing, and palette to the Phaser wood UI tokens. */
:root {
  --ui-line-soft: #3a2416;
  --ui-line-deep: #241006;
  --ui-wood-top: #8a4a1b;
  --ui-wood-mid: #613015;
  --ui-wood-low: #2f1408;
  --ui-wood-panel: #4a230f;
  --ui-parchment: #fff1c8;
  --ui-parchment-low: #e8bd79;
  --ui-gold-top: #ffd96a;
  --ui-gold-mid: #ef9d25;
  --ui-shadow-soft: rgba(23, 8, 2, .34);
  --ui-highlight: rgba(255, 231, 151, .28);
}

html,
body {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(128, 83, 45, .34), transparent 46%),
    linear-gradient(90deg, #1e130c, #3d2518 24%, #27180f 50%, #3d2518 76%, #1e130c);
}

.app {
  padding: 5px 6px 0;
