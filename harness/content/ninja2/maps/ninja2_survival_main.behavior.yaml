name: Ninja2MainWaves3Update
domain: map
"on":
  - event: update
    every: 1s
    do:
      - when: "waveTransitionPending == 1"
        SetBoardVariable: { key: 603, value: 0 }
      - GetUnitCountByTeam: { team: enemy }
      - when: "waveTransitionPending == 0 and wave == 1 and return == 0"
        SetBoardVariable: { key: 603, value: 1 }
        SetWave: { value: 2 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_NINJA2MAINWAVE2 }
      - GetUnitCountByTeam: { team: enemy }
      - when: "waveTransitionPending == 0 and wave == 2 and return == 0"
        SetBoardVariable: { key: 603, value: 1 }
        SetWave: { value: 3 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_NINJA2MAINBOSSWAVE3 }
      - GetUnitCountByTeam: { team: enemy }
      - when: "waveTransitionPending == 0 and wave == 3 and return == 0"
        EndGame: { result: win }

