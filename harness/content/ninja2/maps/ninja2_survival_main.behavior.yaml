# Per-wave pressure: each map ramps hard, while stage 10 stays within 20 stat levels.
name: Ninja2MainWave1
domain: map
"on":
  - event: start
    do:
      - SetBoardState: { value: Playing }
      - SetWave: { value: 1 }
      - SetBoardVariable: { key: 603, value: 0 }
      - SendWaveStartedEvent: {}
      - AddUnit: { unitDataId: 110201, count: 16, level: enemy_level, team: enemy, locationId: 1 }

