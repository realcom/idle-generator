name: SurvivorSwarmStart
domain: unit
"on":
  - event: start
    do:
      - moveRandom: { x: 0.0, y: 0.0, xRange: 1.8, yRange: 1.2 }

---

name: SurvivorSwarmChase
domain: unit
vars:
  attack_range: { type: float, default: 1.7 }
"on":
  - event: update
    every: 0.85s
    do:
      - when: "targetDistance > $attack_range"
        moveRandom: { x: 0.0, y: 0.0, xRange: 1.4, yRange: 1.1 }
      - when: "hasTarget == 1 and targetDistance <= $attack_range"
        stop: {}
        useSkillToTarget: { skillDataId: 300101 }

