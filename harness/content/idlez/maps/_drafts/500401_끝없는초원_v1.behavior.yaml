name: SurvivorMeadowBoss
domain: map
"on":
  - event: start
    do:
      - SendWaveStartedEvent: {}
      - AddUnit: { unitDataId: 110508, count: 1, level: "enemy_level + 4", team: enemy, locationId: 403 }
      - AddUnit: { unitDataId: 110401, count: 16, level: "enemy_level + 3", team: enemy, locationId: 404 }
