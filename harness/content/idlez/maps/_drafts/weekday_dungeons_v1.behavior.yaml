name: WeekdayMondayGoldWave1
domain: map
vars:
  enemy_unit: { type: int, default: 110301 }
  enemy_team: { type: int, default: 4 }
  enemy_spawn: { type: int, default: 1 }
"on":
  - event: start
    do:
      - SetBoardState: { value: Playing }
      - SetWave: { value: 1 }
      - SendWaveStartedEvent: {}
      - AddUnit: { unitDataId: $enemy_unit, count: 10, level: enemyLevel, team: $enemy_team, locationId: $enemy_spawn }

---

