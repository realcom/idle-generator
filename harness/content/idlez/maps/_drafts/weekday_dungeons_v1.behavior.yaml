name: WeekdayMondayGoldWave3
domain: map
vars:
  enemy_unit: { type: int, default: 110301 }
  enemy_team: { type: int, default: 4 }
  enemy_spawn: { type: int, default: 1 }
"on":
  - event: start
    do:
      - SendWaveStartedEvent: {}
      - AddUnit: { unitDataId: $enemy_unit, count: 18, level: "enemyLevel + 2", team: $enemy_team, locationId: $enemy_spawn }

---

name: WeekdayMondayGoldUpdate
domain: map
vars:
  enemy_team: { type: int, default: 4 }
"on":
  - event: update
    every: 1s
    do:
      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "wave == 1 and return == 0"
        SetWave: { value: 2 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_WEEKDAYMONDAYGOLDWAVE2 }
      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "wave == 2 and return == 0"
        SetWave: { value: 3 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_WEEKDAYMONDAYGOLDWAVE3 }
      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "wave == 3 and return == 0"
        SetWave: { value: 9 }
        EndGame: { result: win }

