# 업적 카테고리 인덱스 — content/idlez/achievements/
# 한 카테고리 한 _index.yaml. AI 생성/이동마다 행 추가·갱신.
# 필드:
#   id: int — Achievement.id (profile.id_ranges.achievement: 600000~699999)
#   name: string — 표시명
#   file: string — _drafts/... 또는 approved/... (현 위치)
#   status: draft | approved
#   created_at, created_by: 생성 메타
#   reviewer, reviewed_at: 승인 메타
#   type: Normal | Daily | Weekly | Ranking | EventPass | Mission
#   condition: Condition enum 키 (engine-bound)
#   refs:
#     units: [Unit.id, ...]      # conditionValue1/2가 가리키는 Unit
#     items: [Item.id, ...]      # rewardAddItemGroups의 itemDataId
#     maps:  [Map.id, ...]       # WinGame/WinGameGroup 등
#     parent: Achievement.id | null
#     children: [Achievement.id, ...]
#   tags: [...]                  # series, chapter, tutorial 등 자유 태그

