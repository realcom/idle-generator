# 아이템 카테고리 인덱스 — content/idlez/items/
# 한 카테고리 한 _index.yaml. AI 생성/이동마다 행 추가·갱신.
# 필드:
#   id: int — Item.id (profile.id_ranges.item: 200000~299999)
#   name: string — 표시명
#   file: string — _drafts/... 또는 approved/...
#   status: draft | approved
#   created_at, created_by: 생성 메타
#   reviewer, reviewed_at: 승인 메타
#   category: Weapon | Equipment | Material | Pet | Mine | Product | Stat | Skill | Trait | System | Character | Ranking | Unit
#   type: 세부(Type) — Katana/Head/Material/Pet/Mine/Product/GamePass/Ticket/Boost/...
#   grade, rarity: 등급 (있다면)
#   refs:
#     units: [Unit.id, ...]    # drop_from 또는 unitDataId(Pet)
#     items: [Item.id, ...]    # levelUpMaterialItemGroups, addItemGroups 등
#     skills: [Skill.id, ...]  # equipSkillDataIds
#     buffs: [Buff.id, ...]    # equipAddBuffs
#     achievements: [Ach.id, ...]  # requiredAchievementDataIds
#   tags: [...]                # series, chapter, tutorial 등 자유 태그

