name: SporelingWander
domain: unit

"on":
  - event: start
    do:
      - moveRandom:
          x: -0.85
          y: 0.0
          xRange: 0.12
          yRange: 0.55

---

name: SporelingAttack
domain: unit

vars:
  attack_range: { type: float, default: 1.25 }

"on":
  - event: update
    every: 2s
    do:
      - when: "targetDistance > $attack_range"
        moveRandom:
          x: -0.85
          y: 0.0
          xRange: 0.12
          yRange: 0.55
      - when: "hasTarget == 1 and targetDistance <= $attack_range"
        stop: {}
        useSkillToTarget:
          skillDataId: 300101

