name: WeekdayGoldSwarmStart
domain: unit
"on":
  - event: start
    do:
      - moveRandom: { x: -0.9, y: 0.0, xRange: 0.18, yRange: 0.7 }

---

name: WeekdayGoldSwarmAttack
domain: unit
vars:
  attack_range: { type: float, default: 1.2 }
"on":
  - event: update
    every: 0.8s
    do:
      - when: "targetDistance > $attack_range"
        moveRandom: { x: -0.9, y: 0.0, xRange: 0.18, yRange: 0.7 }
      - when: "hasTarget == 1 and targetDistance <= $attack_range"
        stop: {}
        useSkillToTarget: { skillDataId: 300101 }

