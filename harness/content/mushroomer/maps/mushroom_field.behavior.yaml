---

name: MushroomFieldUpdate
domain: map

vars:
  enemy_team: { type: int, default: 4 }
  sporeling_unit: { type: int, default: 110201 }
  boss_unit: { type: int, default: 110501 }
  enemy_spawn: { type: int, default: 1 }
  wave_transition_pending: { type: int, default: 603 }
  wave_spawned: { type: int, default: 604 }

"on":
  - event: update
    every: 1s
    do:
      - when: "waveTransitionPending == 1"
        SetBoardVariable: { key: $wave_transition_pending, value: 0 }

      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "waveTransitionPending == 0 and wave == 1 and waveSpawned >= 10 and return == 0"
        SetBoardVariable: { key: $wave_transition_pending, value: 1 }
        SetWave: { value: 2 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_MUSHROOMFIELDWAVE2 }

      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "waveTransitionPending == 0 and wave == 2 and waveSpawned >= 10 and return == 0"
        SetBoardVariable: { key: $wave_transition_pending, value: 1 }
        SetWave: { value: 3 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_MUSHROOMFIELDWAVE3 }

      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "waveTransitionPending == 0 and wave == 3 and waveSpawned >= 10 and return == 0"
        SetBoardVariable: { key: $wave_transition_pending, value: 1 }
        SetWave: { value: 4 }
        SendWaveQueuedEvent: { name: MAP_ONSTART_MUSHROOMFIELDBOSSWAVE }

      - GetUnitCountByTeam: { team: $enemy_team }
      - when: "waveTransitionPending == 0 and wave == 4 and waveSpawned >= 1 and return == 0"
        EndGame: { result: win }

      - when: "waveTransitionPending == 0 and wave == 1 and waveSpawned < 10"
        AddUnit:
          unitDataId: $sporeling_unit
          count: 1
          team: $enemy_team
          locationId: $enemy_spawn
        SetBoardVariable: { key: $wave_spawned, value: "waveSpawned + 1" }

      - when: "waveTransitionPending == 0 and wave == 2 and waveSpawned < 10"
        AddUnit:
          unitDataId: $sporeling_unit
          count: 1
          team: $enemy_team
          locationId: $enemy_spawn
        SetBoardVariable: { key: $wave_spawned, value: "waveSpawned + 1" }

      - when: "waveTransitionPending == 0 and wave == 3 and waveSpawned < 10"
        AddUnit:
          unitDataId: $sporeling_unit
          count: 1
          team: $enemy_team
          locationId: $enemy_spawn
        SetBoardVariable: { key: $wave_spawned, value: "waveSpawned + 1" }

      - when: "waveTransitionPending == 0 and wave == 4 and waveSpawned < 1"
        AddUnit:
          unitDataId: $boss_unit
          count: 1
          team: $enemy_team
          locationId: $enemy_spawn
        SetBoardVariable: { key: $wave_spawned, value: "waveSpawned + 1" }
