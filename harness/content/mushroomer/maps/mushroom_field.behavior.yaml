name: MushroomFieldWave1
domain: map

vars:
  melee_unit: { type: int, default: 110201 }
  enemy_team: { type: int, default: 4 }
  enemy_spawn: { type: int, default: 1 }
  wave_spawned: { type: int, default: 604 }

"on":
  - event: start
    do:
      - SetBoardState: { value: Playing }
      - SetWave: { value: 1 }
      - SetBoardVariable: { key: $wave_spawned, value: 0 }
      - SendWaveStartedEvent: {}
      - AddUnit:
          unitDataId: $melee_unit
          count: 5
          level: enemyLevel
          team: $enemy_team
          locationId: $enemy_spawn
      - SetBoardVariable: { key: $wave_spawned, value: 5 }

