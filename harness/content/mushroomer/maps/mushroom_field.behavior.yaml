name: MushroomFieldWave1
domain: map

vars:
  wave1_unit:  { type: int, default: 110201 }
  wave1_count: { type: int, default: 5 }
  enemy_team:  { type: int, default: 4 }
  enemy_spawn: { type: int, default: 1 }

"on":
  - event: start
    do:
      - SetBoardState: { value: Playing }
      - SetWave: { value: 1 }
      - SendWaveStartedEvent: {}
      - AddUnit:
          unitDataId: $wave1_unit
          count: $wave1_count
          team: $enemy_team
          locationId: $enemy_spawn

