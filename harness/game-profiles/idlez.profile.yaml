# ============================================================
# Game Profile: idlez (검증 레퍼런스)
# idlez-client 실제 값에서 증류. 첫 프로필이자 "엔진 vs 게임" 경계 검증용.
# 값 출처: Commons/Resources/*.proto, PatchResources/Items.json(itemGlobal.dataId),
#          ResourceGlobals.json(minNameLength/maxNameLength).
# ============================================================

game:
  id: idlez
  name: "idlez"
  genre: afk-idle-rpg-lite
  engine_ref: idlez-client

stats:
  use:
    - Hp
    - HpPercent
    - Attack
    - AttackPercent
    - GameplayAttackPercent
    - Defense
    - DefensePercent
    - CriticalPercent
    - CriticalDamagePercent
    - AttackSpeed
    - AttackSpeedPercent
    - MoveSpeed
    - CooldownPercent
    - ExpPercent
    - ItemDropPercent
    - Luck
    - MonsterDamageEfficiencyPercent
    - BossDamageEfficiencyPercent
  guardrails:
    CriticalPercent:       { min: 0, max: 100 }
    CriticalDamagePercent: { min: 0, max: 100000 }
    # flat 스탯은 키우기 특성상 큰 수 — 상한은 곡선(growth)에서 관리
    Attack: { min: 1 }
    Hp:     { min: 1 }

# 출처: Items.json itemGlobal.dataId (실제 값)
currencies:
  soft:         { id: 5,  name: "골드" }
  premium:      { id: 3,  name: "루비" }
  premium_free: { id: 4,  name: "무료루비" }
  exp:          { id: 6,  name: "경험치" }
  credit:       { id: 2,  name: "크레딧" }
reserved_ids:
  playerLevel: 1
  rankPoint: 7
  energy: 8
  abilityRank: 1010
  defaultCharacter: 110101
  respawnProduct: 10040
  tutorialGachaProduct: 20801001
  tutorialSummonPetProduct: 20401001
  # 업적 시스템 예약 id — ResourceAchievement.Global.DataId 실제 dataId 값.
  # proto의 field number가 아니라 PatchResources/Achievements.json의 게임별 값이다.
  # 엔진 코드가 직접 참조하는 시스템 업적 — 콘텐츠가 재사용 금지
  achievement:
    tutorialComplete: 610000
    tutorialSteps: [610101, 610102, 610103, 610201, 610202, 610203, 610204, 610205]
    ingameTutorialEnter: 610001
    sentFeedback: -20020904
    reviewedOnStore: -20010101
    chapterEnterAgainCondition: 610010
    battleUnlock: 10000
    equipmentSlotUnlockHead: 10100
    equipmentSlotUnlockChest: 10101
    equipmentSlotUnlockGloves: 10102
    equipmentSlotUnlockBoots: 10103
    equipmentSlotUnlockNecklace: 10104
    equipmentSlotUnlockRing: 10105
    petSlotUnlocks: [50002, 50003, 50004]
    abilityRoot: 10001
    equipmentPetUnlock: 50002
    lobbyDungeonUnlock: 50006
    premiumDailyReward: 20700000
    inventoryAutoSpawnUnlock: 50007

# idlez 실제 id 패턴 관찰: 캐릭터 110101, 가챠상품 20801001 등 다자리 대역.
# (정확한 대역 규칙은 idlez 데이터팀 컨벤션을 따름 — 아래는 신규 콘텐츠 안전 할당용 권장 대역)
id_ranges:
  unit:        { start: 110000, end: 119999, note: "캐릭터/펫. 예: defaultCharacter 110101" }
  item:        { start: 200000, end: 299999 }
  skill:       { start: 300000, end: 399999 }
  buff:        { start: 400000, end: 499999 }
  map:         { start: 500000, end: 599999 }
  achievement: { start: 600000, end: 699999, note: "업적. 예: first_kill 600001" }
  reward:      { start: 700000, end: 799999, note: "AddItemGroup 보상 묶음" }

theme:
  tone: "귀여운 / 캐주얼 키우기"
  setting: "슬라임·햄찌(햄스터)·닌자가 등장하는 캐주얼 아이들 RPG"
  naming_style: "한글 2~10자 (ResourceGlobals: minNameLength=2, maxNameLength=10)"
  motifs: [슬라임, 햄찌, 닌자]
  # 관찰된 맵 모티프: Jungle/Meadow/Beach/Castle/Lake/Plains/SlimeQueen/InfiniteTrain/Hotragon

balance:
  level_cap: 200
  required_exp:
    monotonic: increasing
  prestige:
    enabled: true
    name: "환생"     # idlez 실제 명칭은 데이터 확인 필요 (placeholder)
  idle:
    offline_cap_hours: 12

behavior:
  triggerType_map: {}      # 기본 매핑 사용 (update 등). 정본은 컴파일러.
  disallow_actions: []
