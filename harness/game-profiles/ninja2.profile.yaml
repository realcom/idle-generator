# ============================================================
# Game Profile: ninja2
# 닌자 서바이벌 2 — Survival + Housing 동시 MVP.
# 엔진 확장은 최후 수단으로 두고, 첫 구현은 idlez Resource* 계약 안에서
# 전투 보상 -> 영지 생산/건설 -> 전투 보너스 루프를 닫는다.
# ============================================================

game:
  id: ninja2
  name: "닌자 서바이벌 2"
  genre: afk-idle-rpg-lite
  engine_ref: idlez-client

modes:
  mvp: [Survival, Housing]
  future: [Alliance4X]
  note: "서바이벌과 하우징은 첫 MVP부터 한 루프로 묶고, 4X는 같은 영지 자산 위에 확장한다."

