theme:
  tone: "밝고 귀여운 성소 성장 + 살짝 수상한 숲 탐험"
  setting: "작은 성소를 키우고 바깥 숲으로 출격하는 캐주얼 생존 하이브리드"
  naming_style: "한글 2~10자, 짧고 액션성이 드러나는 이름"
  motifs: [성소, 헥스영지, 등불, 숲정령, 허브밭, 영혼불, 안개타일, 작은작업장]
  character_anchor: "등불을 든 작은 성소 수호자. 따뜻한 갈색 머리, 또렷한 눈, 크림색 후드 망토, 붉은 스카프, 원형 펜던트, 이마의 잎/불꽃형 흉터가 있는 호감형 주인공."
  pivot_candidate:
    key: casual_sanctuary
    tone: "밝고 귀여운 숲속 성소 + 살짝 수상한 탐험 숲"
    balance: "Cute 70 / Mystery 30"
    setting: "작은 성소를 꾸미고 주민을 돌보며, 바깥 숲으로 출격해 자원과 영혼불을 회수하는 모바일 캐주얼 생존 하이브리드"
    motifs: [성소, 등불, 숲정령, 허브밭, 영혼불, 안개타일, 작은작업장]
    character_anchor: "등불을 든 작은 성소 수호자. 밝은 얼굴, 후드 망토, 잎 장식, 원형 펜던트, 이마의 잎/불꽃형 흉터, 따뜻한 불빛, 주민을 이끄는 호감형 주인공."
    runtime_character_style: "키아트와 별도로 Spine-ready SD 캐릭터를 제작한다. 정면 neutral pose, 단순화한 머리/망토/스카프/등불 파츠, scar overlay, 모바일 전투에서 읽히는 밝은 망토 실루엣을 우선한다."
    avoid: [양, 왕관, 검은복면, 큰검, 직접적인컬트상징, 고어]

balance:
  level_cap: 160
  required_exp:
    monotonic: increasing
  prestige:
    enabled: false
    name: ""
  idle:
    offline_cap_hours: 8

progression:
  core_loop:
    name: survival_housing_mvp
    rule: "모든 메인 스테이지 보상은 적어도 하나의 하우징 재료나 생산 노드 강화 재료를 포함한다."
    survival:
      map_series: ninja2-survival-housing-10
      first_map: 500101
      rewards_feed_housing: true
      screen_style: "portrait ultra-flat 2D top-down arcade survivors-like sprite arena"
      combat_loop: "자동 공격, 적 웨이브, 생존 타이머, EXP/자원 픽업, 스킬 쿨다운, 귀환 보상"
      visual_contract: "키아트보다 실제 인게임 가시성을 우선한다. 단색에 가까운 잔디 필드, 3~4종 반복 적 스프라이트, 굵은 외곽선, 큰 피해 숫자, 파란 EXP 조각, 가장자리형 플랫 HUD로 구성한다."
    housing:
      representation:
        map: "portrait hybrid 2.5D hex-grid sanctuary expansion board"
        production_nodes: "Item.Category=Mine"
        passive_building_bonuses: "Item.Category=Stat 또는 Buff/achievement reward"
        visual_buildings: "3D풍 pre-rendered building sprite atlas 또는 필요 시 Unit.Type=Building"
        resident_characters: "2D Spine-style 주민/수호자 캐릭터를 하우징 보드 위에 y-sort로 배치"
        placement_model: "건물 정의는 blueprint, 실제 보드 배치는 instance. 저장고/수용량/일반 생산 건물은 repeatable, 신전/관리/전역 보너스 건물은 singleton."
        starting_built: "첫 진입 시 등불 신전 1개만 설치되어 있고, 목재 작업장과 용병 훈련소는 온보딩 건설 목표로 제공한다."
        sortie_flow: "하우징 홈의 출격 버튼으로 별도 Survival 전투 화면 진입"
        visual_contract: "하우징은 전투보다 예쁜 2.5D 소유감을 허용한다. 헥스 타일은 built/selected/empty/locked/fogged/expandable 상태를 명확히 구분하고, 건물은 둥근 3D풍 디오라마 자산처럼 표현한다. 주민/수호자는 2D Spine 캐릭터로 얹고, UI는 전투와 같은 굵은 외곽선/재화 색상 규칙을 공유한다."
      first_nodes:
        - { id: 200600, name: "등불 신전", output: "성소 레벨/타일 확장" }
        - { id: 200602, name: "목재 작업장", output: "목재" }
        - { id: 200601, name: "용병 훈련소", output: "경험치/동료 성장" }
        - { id: 200604, name: "채석장", output: "석재" }
        - { id: 200603, name: "영혼광맥", output: "영혼불" }
      expansion_nodes:
        ring_2: [200605, 200606, 200607, 200608, 200609]
        ring_3: [200610, 200611, 200612]
    future_4x:
      unlock_after: "Survival+Housing D7 loop 검증"
      reuse_assets: [housing_buildings, clan_tokens, territory_materials]

