<svg xmlns="http://www.w3.org/2000/svg" width="90mm" height="50mm" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">UnionJam Inc. business card back</title>
  <desc id="desc">Black and white flat back side of a business card for UnionJam Inc.</desc>
  <defs>
    <style>
      .white-sans { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; }
      .white-mono { font-family: "Courier New", Courier, monospace; fill: #ffffff; }
    </style>
  </defs>

  <rect width="900" height="500" fill="#111111"/>
  <rect x="32" y="32" width="836" height="436" fill="none" stroke="#ffffff" stroke-width="3"/>

  <g transform="translate(350 110)" fill="#ffffff">
    <rect x="0" y="0" width="52" height="52"/>
    <rect x="64" y="0" width="52" height="52"/>
    <rect x="128" y="0" width="52" height="52"/>
    <rect x="0" y="64" width="52" height="52"/>
    <rect x="128" y="64" width="52" height="52"/>
    <rect x="0" y="128" width="52" height="52"/>
    <rect x="64" y="128" width="52" height="52"/>
    <rect x="128" y="128" width="52" height="52"/>
  </g>

  <text class="white-sans" x="450" y="347" text-anchor="middle" font-size="62" font-weight="700" letter-spacing="1">UNIONJAM</text>
  <text class="white-mono" x="450" y="390" text-anchor="middle" font-size="22" letter-spacing="6">INC.</text>

  <g fill="#ffffff">
    <rect x="64" y="64" width="12" height="12"/>
    <rect x="88" y="64" width="12" height="12"/>
    <rect x="112" y="64" width="12" height="12"/>
    <rect x="64" y="88" width="12" height="12"/>
    <rect x="64" y="112" width="12" height="12"/>

    <rect x="824" y="412" width="12" height="12"/>
    <rect x="800" y="412" width="12" height="12"/>
    <rect x="776" y="412" width="12" height="12"/>
    <rect x="824" y="388" width="12" height="12"/>
    <rect x="824" y="364" width="12" height="12"/>
  </g>
</svg>
