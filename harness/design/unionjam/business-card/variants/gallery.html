<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UnionJam Business Card Concepts</title>
  <style>
    :root {
      background: #f2f2f2;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    .gallery {
      display: grid;
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .concept {
      display: grid;
      gap: 12px;
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 8px 24px rgb(0 0 0 / 0.12);
    }

    @media (max-width: 760px) {
      body { padding: 18px; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <div class="concept">
      <div class="label">Concept 01 - Border Pixel</div>
      <div class="cards">
        <img src="unionjam-card-concept-01-front.svg" alt="Concept 01 front">
        <img src="unionjam-card-concept-01-back.svg" alt="Concept 01 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 02 - Split Panel</div>
      <div class="cards">
        <img src="unionjam-card-concept-02-front.svg" alt="Concept 02 front">
        <img src="unionjam-card-concept-02-back.svg" alt="Concept 02 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 03 - Terminal</div>
      <div class="cards">
        <img src="unionjam-card-concept-03-front.svg" alt="Concept 03 front">
        <img src="unionjam-card-concept-03-back.svg" alt="Concept 03 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 04 - Arcade Grid</div>
      <div class="cards">
        <img src="unionjam-card-concept-04-front.svg" alt="Concept 04 front">
        <img src="unionjam-card-concept-04-back.svg" alt="Concept 04 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 05 - Diagonal Slash</div>
      <div class="cards">
        <img src="unionjam-card-concept-05-front.svg" alt="Concept 05 front">
        <img src="unionjam-card-concept-05-back.svg" alt="Concept 05 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 06 - Offset Block</div>
      <div class="cards">
        <img src="unionjam-card-concept-06-front.svg" alt="Concept 06 front">
        <img src="unionjam-card-concept-06-back.svg" alt="Concept 06 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 07 - System Grid</div>
      <div class="cards">
        <img src="unionjam-card-concept-07-front.svg" alt="Concept 07 front">
        <img src="unionjam-card-concept-07-back.svg" alt="Concept 07 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 08 - Reverse Black</div>
      <div class="cards">
        <img src="unionjam-card-concept-08-front.svg" alt="Concept 08 front">
        <img src="unionjam-card-concept-08-back.svg" alt="Concept 08 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 09 - Pattern Field</div>
      <div class="cards">
        <img src="unionjam-card-concept-09-front.svg" alt="Concept 09 front">
        <img src="unionjam-card-concept-09-back.svg" alt="Concept 09 back">
      </div>
    </div>
    <div class="concept">
      <div class="label">Concept 10 - Thin Editorial</div>
      <div class="cards">
        <img src="unionjam-card-concept-10-front.svg" alt="Concept 10 front">
        <img src="unionjam-card-concept-10-back.svg" alt="Concept 10 back">
      </div>
    </div>
  </div>
</body>
</html>
