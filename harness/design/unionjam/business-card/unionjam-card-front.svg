<svg xmlns="http://www.w3.org/2000/svg" width="90mm" height="50mm" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">UnionJam Inc. business card front</title>
  <desc id="desc">Black and white flat business card for Yang Jin Hwan, CTO of UnionJam Inc.</desc>
  <defs>
    <style>
      .sans { font-family: Arial, Helvetica, sans-serif; fill: #111111; }
      .mono { font-family: "Courier New", Courier, monospace; fill: #111111; }
      .label { font-size: 18px; letter-spacing: 3px; }
      .micro { font-size: 14px; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="900" height="500" fill="#ffffff"/>
  <rect x="32" y="32" width="836" height="436" fill="none" stroke="#111111" stroke-width="3"/>

  <g transform="translate(64 64)">
    <rect x="0" y="0" width="34" height="34" fill="#111111"/>
    <rect x="42" y="0" width="34" height="34" fill="#111111"/>
    <rect x="84" y="0" width="34" height="34" fill="#111111"/>
    <rect x="0" y="42" width="34" height="34" fill="#111111"/>
    <rect x="84" y="42" width="34" height="34" fill="#111111"/>
    <rect x="0" y="84" width="34" height="34" fill="#111111"/>
    <rect x="42" y="84" width="34" height="34" fill="#111111"/>
    <rect x="84" y="84" width="34" height="34" fill="#111111"/>
  </g>

  <g transform="translate(214 74)">
    <text class="sans" x="0" y="38" font-size="38" font-weight="700" letter-spacing="0">UnionJam Inc.</text>
  </g>

  <g transform="translate(64 258)">
    <text class="sans" x="0" y="0" font-size="56" font-weight="700">Yang Jin Hwan</text>
    <text class="mono label" x="3" y="42">CTO</text>
  </g>

  <line x1="64" y1="386" x2="836" y2="386" stroke="#111111" stroke-width="3"/>

  <g transform="translate(64 425)">
    <text class="mono" x="0" y="0" font-size="24" letter-spacing="1">+82 10 2647 0377</text>
    <text class="mono" x="0" y="32" font-size="20" letter-spacing="1">jin@unionjam.com</text>
    <text class="mono micro" x="772" y="32" text-anchor="end">UNIONJAM INC.</text>
  </g>

  <g fill="#111111">
    <rect x="772" y="64" width="16" height="16"/>
    <rect x="796" y="64" width="16" height="16"/>
    <rect x="820" y="64" width="16" height="16"/>
    <rect x="820" y="88" width="16" height="16"/>
    <rect x="820" y="112" width="16" height="16"/>
    <rect x="796" y="112" width="16" height="16"/>
    <rect x="772" y="112" width="16" height="16"/>
  </g>
</svg>
