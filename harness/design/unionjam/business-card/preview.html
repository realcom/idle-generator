<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UnionJam Inc. Business Card Preview</title>
  <style>
    :root {
      color: #111;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px;
    }

    .preview {
      display: grid;
      gap: 28px;
      max-width: 1080px;
      margin: 0 auto;
    }

    img {
      display: block;
      width: min(100%, 900px);
      height: auto;
      background: #fff;
      box-shadow: 0 10px 30px rgb(0 0 0 / 0.12);
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
      }

      .preview {
        display: block;
        margin: 0;
      }

      img {
        width: 90mm;
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <div class="preview">
    <img src="unionjam-card-front.svg" alt="UnionJam Inc. business card front">
    <img src="unionjam-card-back.svg" alt="UnionJam Inc. business card back">
  </div>
</body>
</html>
