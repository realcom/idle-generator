version: "1.0"
game: ninja2
source_concepts:
  - ninja2_rulelocked_housing_home_a
  - ninja2_rulelocked_survival_battle_a
  - ninja2_run_levelup_choice_modal_a
status: extracted

skins:
  panel:
    fill: "#2a261e"
    alt_fill: "#f4dfb1"
    outline: "#171f18"
    outline_px: 4
    radius_px: 14
    shadow: "0 4px 0 rgba(0,0,0,.32)"
  resource_chip:
    fill: "#2b241c"
    text: "#f8ead1"
    icon_shapes: ["wood log", "soul flame", "coin", "blue crystal"]
    plus_button: "small cream circle"
  topbar_cluster:
    hero_portrait_status: "native circular gold portrait frame with guardian avatar sprite, level badge, lantern accent, and green progress bar; no name text in the top-left cluster"
    resource_row: "four separate horizontal dark resource pills across the top row; not a 2x2 resource board"
    resource_chip: "dark pill frame may use generated 9-slice or native rounded frame; resource icon and value remain separate atoms"
    population_menu_cluster: "resident capacity pill plus menu and settings round-corner buttons in the second row on the right"
    resource_icons: ["coin", "soul teal orb", "wood log", "stone diamond", "cream plus"]
    production_contract: "Only resource_board and resource_chip are Phaser phaser_nineslice skins; profile/status cards and icons are fixed sprites."
    runtime_usage: "DOM preview uses the same PNGs via CSS border-image/background fallback under harness/runtime/assets/ninja2/ui/topbar; Phaser UI runtime should call scene.add.nineslice for the accepted resource skins."
  hex_tile:
    source: "state-specific transparent PNG hex ground tiles derived from the generated forest sanctuary background"
    built: "forest ground texture visible under buildings with subtle stone edge"
    selected: "same ground texture with cyan rim glow"
    empty: "lighter forest ground tile with a small stake/foundation marker, not a button-like plus"
    locked: "dark shaded forest ground tile with low-contrast native lock mark"
    fogged: "dark misted forest ground tile with soft mist mark"
    expandable: "forest ground tile with lantern-gold dashed edge and cost"
  settlement_layer:
    purpose: "make the housing board read as the player's owned base rather than a standalone hex puzzle"
    owned_ground: "subtle warm clearing behind built cluster; never cover the full background"
    paths: "thin stone/dirt paths from the selected shrine to production buildings"
    foundations: "footprint-specific yard/plaza/garden pads under building sprites"
    footprint_occupancy: "building footprint controls actual occupied hexes and sprite center; large buildings must not read as oversized art on a single tile"
    props: ["small lanterns", "wood crates", "red shrine flag", "dark shrubs", "stones"]
  building:
    style: "2.5D pre-rendered sprite impression"
    footprint_variants: ["1x1 guard utility occupies 1 hex", "1x2 production hut occupies 2 hexes", "1x3 garden/yard occupies 3 hexes", "2x2 sanctuary centerpiece occupies 4 hexes"]
    details: ["teal roof", "lantern windows", "stone base", "tiny flags/wood piles/planters"]
    labels: "compact black Lv plaque only; footprint is data/placement behavior, not visible map text"
    map_badges: "small +production pill so large buildings do not cover the forest-ground hex texture"
  sortie_button:
    fill: "fixed orange faceted sprite"
    outline: "#171f18"
    text: "large cream bold"
    icon: "baked crossed-swords emblem in the fixed sprite; native text remains separate"
    nine_slice: "rejected: hexagonal silhouette, baked emblem, and sparkle accents are not stretch-safe"
  battle_enemy:
    variants: ["leaf imp", "soot spirit", "thorn bush", "purple mushroom"]
    outline_px: 4
    eyes: "small yellow/cream readable eyes"
  battle_pickup:
    exp: "blue diamond with label when large"
    coin: "generated topbar coin PNG reused as the Phaser coinDrop texture"
    soul: "generated topbar soulflame PNG reused as the Phaser soulFlame texture"
    wood: "generated topbar wood log PNG reused as the Phaser woodCrate texture"
    stone: "generated topbar faceted stone PNG reused as the Phaser stoneDrop texture"
  battle_profile_portrait:
    source: "approved battle guardian sprite, cropped into a transparent circular avatar cutout"
    shape: "native circular HUD frame owns the outline; bitmap contains only the guardian face, scarf, cloak, and warm inner glow"
    avoid: "no baked level text, HP, numbers, or reusable frame border"
  battle_skill_button:
    shape: "large black-rimmed circle"
    fill: "dark radial"
    icon_colors: ["lantern gold", "soul teal", "sunburst gold"]
    cooldown_text: "cream numeric label"
  battle_counter_icon:
    source: "asset-plan.yaml:ninja2.ui.battle_counter_icons_v1"
    usage: "timer, kill, enemy, pickup, and boss/stage HUD counters"
    style: "transparent 96px glyph atoms with dark ink outline, lantern-gold highlight, and teal soulflame glow"
    avoid: "no baked labels, numbers, timer text, stage text, or HUD frames"
  battle_encounter_icon:
    source: "asset-plan.yaml:ninja2.battle.encounter_icons.light_v1"
    usage: "bomb, magnet, potion, and mine map-trigger encounter pickups in the survival playfield"
    style: "very light transparent glyph atoms; one simple silhouette, one main fill, one small accent, generous empty space"
    avoid: "no dense internal texture, no HUD badge framing, no text, no amount labels, no baked collection rings, and no heavy drop shadow"
  housing_home:
    blueprint: component-blueprints.yaml:surfaces.HousingHome
    purpose: "Lantern sanctuary city home assembled from semantic top, side, board, action-row, and nav sections."
    top_identity_band: "Rulelocked concept top HUD: circular hero portrait/status cluster, single horizontal resource pill row, and population/menu/settings cluster. No centered sanctuary status plaque."
    sanctuary_board: "Forest background, state-specific hex tile PNGs, y-sorted building sprites, native production bubbles, and low-priority expansion costs."
    bottom_action_row: "Companion shortcut strip, widened selected building parchment panel with integrated production/collect chip, and fixed orange sortie sprite share one bottom loop row above the tab dock. No standalone left collect card."
    bottom_navigation_dock: "Five native MVP loop tabs with stable dimensions; selected tab uses lantern-gold fill."
    layer_policy: "Top, side rail, loop toast, action row, sortie CTA, and nav dock must layer above expansion cost markers."
    text_policy: "Building names, resource values, progress, costs, and tab labels stay native runtime text; buildable board placeholders use compact glyphs only."
  run_levelup_choice:
    blueprint: component-blueprints.yaml:surfaces.RunLevelUpChoice
    purpose: "Three-card run skill upgrade modal over a dimmed survival battle."
    modal_panel: "cream parchment 9-slice skin with dark ink outline; header, title, run summary, and choices are native layout slots"
    frame_ornaments: "fixed transparent sprite overlays for the lantern crest and leafy corner clusters; they sit on the panel border and do not stretch"
    choice_card: "repeatable parchment card shell; card bitmap may provide frame/material only, while badge, skill icon, name, pips, summary, chips, and category remain native slots"
    skill_icon_well: "native circular disc containing the generated skill icon sprite; the icon asset does not include the disc, card frame, text, or pips"
    footer: "reroll remains hidden until run-limited cost and remaining count are wired"
    spacing_source: "component-blueprints.yaml owns content_insets, padding, slot gaps, clamp behavior, and responsive reductions"
    nine_slice_policy:
      panel_and_card_skin: "accepted only when text/icons/badges/pips are not baked into the bitmap"
      ornament_sprites: "not 9-slice; use asset-plan.yaml:ninja2.ui.level_choice.frame_ornaments_v1 as fixed overlays"
      slice_hints_source: "asset-plan.yaml:ninja2.ui.panel.parchment_9slice"
      content_insets_source: "component-blueprints.yaml:asset_dependency_matrix.ninja2.ui.panel.parchment_9slice"
