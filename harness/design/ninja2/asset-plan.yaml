  - ninja2_rulelocked_survival_battle_a
status: extracted

assetization_summary:
  generate_image:
    - "home forest sanctuary background with transparent-safe board clearing"
    - "Lantern Shrine and production building sprite atlas"
    - "sanctuary extension building atlas for quarry, workshop, scout post, and midgame production"
    - "SD guardian portrait and board resident sprite set"
    - "parchment panel plus resource board/chip 9-slice skins"
    - "orange sortie button fixed sprite"
    - "battle enemy and pickup atlas"
  native_ui:
    - "top resource chip layout and text"
    - "hex grid coordinates and tile state overlays"
    - "progress bars, timers, labels, nav tabs"
  hybrid:
    - "building cards use generated sprite plus native labels/progress"
    - "sortie button uses generated skin plus native text"
    - "battle skill buttons use native circles plus generated icons"
    - "battle skill VFX use Phaser-native graphics/tweens first, then graduate selected effects to bitmap atlases later"
  reuse:
    - "source concept images remain visual references only"

