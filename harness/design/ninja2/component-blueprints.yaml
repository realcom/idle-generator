review_gate:
  pass_conditions:
    - "All three cards remain equal-width and comparable at 440px and 390px viewport widths."
    - "Skill icon sprites are independent assets inside native circular wells."
    - "Panel and card skins contain no text, pips, badges, or stat values."
    - "The visible border ornament layer is represented by fixed transparent sprites, not by the stretchable 9-slice center."
    - "slice_hints and content_insets are both present for every rectangular generated skin."
    - "Runtime CSS values can be traced back to this blueprint or layout-tokens.yaml."
    - "The common modal harness opens every registered variant without ResourceStore or BoardKernel."
    - "ModalShell renders through Phaser nineslice when the parchment texture is available and falls back only for debug visibility."
    - "Confirm, reward, list, settings, skill-choice, and notice variants share the same ModalHost open/close lifecycle."
  blockers:
    - "Generated full modal PNG used as implementation."
    - "Card text changes card width or breaks the three-column comparison."
    - "9-slice border values are reused as text padding without an explicit content inset."
    - "Concept border ornaments are dropped or replaced only by native CSS shapes without a planned/generated asset."
    - "Reroll button appears before its cost and remaining-count data are wired."
    - "A modal variant owns its own full-screen input blocker instead of using ModalHost."
    - "The common harness requires a game content bundle to preview shell, confirm, reward, list, settings, or notice variants."
