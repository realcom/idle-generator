version: "1.0"
game: ninja2
status: pilot
purpose: "Semantic component decomposition layer between selected concepts, generated assets, and runtime layout."

source_concepts:
  primary:
    id: ninja2_rulelocked_housing_home_a
    note: concepts/ninja2_rulelocked_housing_home_a.md
    image: concepts/ninja2_rulelocked_housing_home_a.png
  supporting:
    - ninja2_run_levelup_choice_modal_a
    - ninja2_phaser_modal_system_a
    - ninja2_flat_arcade_survivors_scene_f

runtime_targets:
  phaser_dom_overlay:
    spec: ../../runtime/specs/ui/ninja2-run-levelup-choice.yaml
    page: ../../runtime/survivor-runtime.html
    owner: ../../runtime/src/survivor/survivor-app.js
  phaser_modal_system_harness:
    spec: ../../runtime/specs/ui/phaser-modal-system-harness.yaml
    page: ../../runtime/phaser-modal-system-harness.html
    owner: ../../runtime/src/ui/phaser-modal-system-harness.js

extraction_rules:
  semantic_first:
    - "Name UI by player meaning before naming skins or image files."
    - "Every generated rectangular skin must declare both stretch borders and content insets."
    - "Text, numbers, pips, badges, cooldowns, and costs remain runtime-native unless explicitly marked decorative."
    - "A component must be explainable as slots and data bindings even if all bitmap skins are temporarily removed."
  sizing_language:
    slice_hints: "Bitmap cap borders used by Phaser 9-slice or Unity sliced sprites."
    content_insets: "Inner safe area where native text, icons, chips, and touch affordances may live."
    padding: "Runtime layout spacing inside the content area."
    gap: "Spacing between sibling slots with different semantic roles."

surfaces:
  HousingHome:
    intent: "Let the player read, expand, upgrade, and sortie from the lantern sanctuary city without losing the owned-base board."
    orientation: portrait_9_16
    reference_size_px: { width: 440, height: 782 }
    concept_size_px: { width: 941, height: 1672 }
    source_concepts:
      primary: ninja2_rulelocked_housing_home_a
      supporting:
        - ninja2_housing_bottom_loop_dock_b
        - ninja2_housing_bottom_inspector_no_collect_c
    sections:
      top_identity_band:
        role: "Own the compact top HUD from the rulelocked concept: hero portrait/status, horizontal resource pills, population, menu, and settings."
        process_scope: section
        components:
          - HomeTopBand
          - HeroPortraitStatus
          - TopResourcePillRow
          - TopResourcePill
          - PopulationMenuCluster
          - TopRoundIconButton
        layout_contract:
          anchor: top_safe_area
          height_px: { target: 96, compact: 92 }
          grid_rows: ["primary_resources", "secondary_controls"]
          profile_anchor: top_left_overlap_two_rows
          resource_layout: "single horizontal pill row to the right of the profile cluster"
          secondary_controls: "population, menu, and settings align under the right resource pills"
          forbidden_elements:
            - "centered sanctuary status plaque"
            - "large 2x2 resource board"
          board_clearance_policy: "Top band may mask the forest edge but must not cover the central shrine cluster."
        asset_keys:
          - ninja2.ui.profile.guardian_avatar
          - ninja2.ui.topbar.cluster_skins
      side_utility_rail:
        role: "Provide secondary home entries without becoming a primary reading column."
        process_scope: section
        components:
          - HomeSideRail
          - HomeSideButton
        layout_contract:
          anchor: left_between_top_and_bottom
          width_px: 56
          button_height_px: 58
          gap_px: 8
          collision_policy: "Board costs and building bubbles must avoid or fade behind this rail."
      sanctuary_board:
        role: "Show the owned city board, building footprints, production bubbles, expansion costs, and selected building focus."
        process_scope: section
        components:
          - HomeBoardViewport
          - HexTileLayer
          - SettlementOrnamentLayer
          - BuildingSpriteToken
          - BuildingProductionBubble
          - ExpansionCostMarker
        layout_contract:
          anchor: between_top_band_and_bottom_action_row
          top_px: 96
          bottom_px: 250
          pan_px: { x: 10, y: -70 }
          scale: 1.04
          y_sort: true
          cost_policy: "Expansion costs are secondary; clamp size and de-emphasize near side rail or bottom action row."
        asset_keys:
          - ninja2.home.background.forest_sanctuary
          - ninja2.home.hex_tile_set.forest_sanctuary
          - ninja2.home.building_atlas.lantern_sanctuary
      bottom_action_row:
        role: "Tie companion shortcuts, selected building actions, integrated production/collect status, and sortie into one clear bottom loop row."
        process_scope: section
        components:
          - HomeBottomActionRow
          - IntegratedCollectStatusChip
          - CompanionShortcutStrip
          - HomeLoopToast
          - SelectedBuildingPanel
          - BuildingThumbnailWell
          - BuildingInfoStack
          - UpgradeActionButton
          - SortieCtaButton
        layout_contract:
          anchor: above_bottom_navigation
          panel_columns: ["building_thumb", "copy_and_progress", "integrated_collect_status", "upgrade_button"]
          companion_strip: "three compact slots sit above the action row and shortcut into companion management"
          row_gap_px: 12
          panel_height_px: { target: 126, compact: 108 }
          forbidden_external_controls:
            - "standalone left quick collect button"
          sortie_size_px: { width: 118, height: 122 }
          toast_policy: "Toast sits above the action row and should never overlap selected-building text."
        asset_keys:
          - ninja2.ui.panel.parchment_9slice
          - ninja2.ui.button.sortie_orange
      bottom_navigation_dock:
        role: "Provide fixed home mode navigation as five stable MVP loop tabs below the action row."
        process_scope: section
        components:
          - HomeTabDock
          - HomeTabButton
        layout_contract:
          anchor: bottom_safe_area
          tab_count: 5
          labels: ["성소", "동료", "탐험", "임무", "상점"]
          omitted_mvp_tab: "가방 is not a fixed D1 dock tab; expose inventory later through contextual or modal entry."
          height_px: { target: 92, compact: 88 }
          stable_dimensions: true
          selected_state: "lantern gold fill with dark icon and text"
    component_tree:
      - HomeTopBand
      - HeroPortraitStatus
      - TopResourcePillRow
      - TopResourcePill
      - PopulationMenuCluster
      - TopRoundIconButton
      - HomeSideRail
      - HomeSideButton
      - HomeBoardViewport
      - HexTileLayer
      - SettlementOrnamentLayer
      - BuildingSpriteToken
      - BuildingProductionBubble
      - ExpansionCostMarker
      - HomeBottomActionRow
      - IntegratedCollectStatusChip
      - CompanionShortcutStrip
      - HomeLoopToast
      - SelectedBuildingPanel
      - BuildingThumbnailWell
      - BuildingInfoStack
      - UpgradeActionButton
      - SortieCtaButton
      - HomeTabDock
      - HomeTabButton
    layout_contract:
      shell_width: "min(440px, 100vw)"
      top_band_height_px: 96
      board_region_px: { top: 96, bottom: 250 }
      bottom_action_bottom_px: 96
      bottom_nav_height_px: 92
      primary_action_color: action_orange
      responsive_policy: "Tighten vertical gaps before shrinking tap targets or letting Korean labels overflow."

  RunLevelUpChoice:
    intent: "Pause the survival run and let the player choose exactly one run-scoped skill upgrade from three equal cards."
    orientation: portrait_9_16
    reference_size_px: { width: 440, height: 782 }
    concept_size_px: { width: 948, height: 1659 }
    sections:
      paused_battle_context:
        role: "Preserve the paused survival battle as readable context while blocking game input."
        process_scope: section
        components:
          - LevelChoiceModalBackdrop
        layout_contract:
          anchor: absolute_inset
          z_order: below_modal_panel
          pointer_policy: captures_background_input
        qa_focus:
          - "Battle HUD remains visible enough to understand the run state."
          - "Joystick, skill buttons, and EXP bar do not compete with the modal choices."
      modal_frame:
        role: "Own the parchment panel skin and concept border decorations."
        process_scope: section
        components:
          - LevelChoicePanel
          - FrameOrnamentLayer
          - CrestOrnament
          - PanelCornerOrnament
        layout_contract:
          anchor: centered
          width: "min(760px, calc(100vw - 24px))"
          max_height: "78dvh"
          ornament_policy: "Fixed transparent sprites may overlap outer border but not content slots."
        asset_keys:
          - ninja2.ui.panel.parchment_9slice
          - ninja2.ui.level_choice.frame_ornaments_v1
      modal_header:
        role: "Explain the level-up moment and show compact run context."
        process_scope: section
        components:
          - LevelChoiceHeader
        layout_contract:
          anchor: panel_top
          padding_px: { left: 14, right: 14, top: 34, bottom: 8 }
          responsive: "Hide run summary chip below 390px before changing title hierarchy."
      choice_body:
        role: "Let the player compare exactly three run skill choices."
        process_scope: section
        components:
          - SkillChoiceGrid
          - SkillChoiceCard
          - ChoiceBadge
          - SkillIconWell
          - LevelPipRow
          - EffectChip
          - CategoryChip
        layout_contract:
          columns: 3
          gap_px: { target: 10, narrow: 7, compact: 5 }
          card_min_height_px: { target: 258, narrow: 238, compact: 204 }
          overflow_policy: "Clamp secondary text before changing the three-card grammar."
        asset_keys:
          - ninja2.battle.skill_icons.survivor_level_choice_v1
      optional_footer:
        role: "Hold reroll affordances only after run-limited cost and remaining count are wired."
        process_scope: section
        components:
          - RerollFooter
        layout_contract:
          anchor: panel_bottom_center
          first_pass_visibility: hidden
        dependency:
          requires_data:
            - run.rerollCost
            - run.rerollsRemaining
    component_tree:
      - LevelChoiceModalBackdrop
      - LevelChoicePanel
      - FrameOrnamentLayer
      - LevelChoiceHeader
      - SkillChoiceGrid
      - SkillChoiceCard
      - SkillIconWell
      - LevelPipRow
      - EffectChip
      - CategoryChip
      - RerollFooter
    layout_contract:
      panel_width: "min(760px, calc(100vw - modal_edge_padding * 2))"
      panel_max_height: "78dvh"
      modal_edge_padding_px:
        top: 26
        side: 12
        bottom: 86
      narrow_modal_edge_padding_px:
        top: 24
        side: 8
        bottom: 78
      grid_columns:
        target: 3
        min_width_before_content_clamp_px: 390
        fallback: "Keep three columns; hide secondary copy before using one column."

  PhaserModalSystem:
    intent: "Provide a reusable Phaser-first modal family harness so confirm dialogs, rewards, lists, settings, notices, and run choices can share one lifecycle and skin contract."
    orientation: responsive_preview
    reference_size_px: { width: 440, height: 782 }
    concept_size_px: { width: 941, height: 1672 }
    source_concepts:
      primary: ninja2_phaser_modal_system_a
      supporting:
        - ninja2_run_levelup_choice_modal_a
        - ninja2_flat_arcade_survivors_scene_f
    sections:
      modal_host:
        role: "Own the full-screen preview context, modal lifecycle, input capture, and game-pause contract."
        process_scope: section
        components:
          - ModalHarnessViewport
          - ModalHost
          - ModalScrim
        layout_contract:
          anchor: absolute_inset
          preview_sizes_px:
            compact: { width: 390, height: 760 }
            portrait: { width: 440, height: 782 }
            wide: { width: 760, height: 720 }
          pointer_policy: "Only the active modal receives input; background HUD/control mocks are visible but inert."
          fixture_policy: "Every modal variant opens without requiring compiled game state."
      modal_shell:
        role: "Reuse the parchment 9-slice panel and fixed ornament layer across all modal variants."
        process_scope: section
        components:
          - ModalShell
          - FrameOrnamentLayer
          - CrestOrnament
          - PanelCornerOrnament
          - ModalCloseButton
        layout_contract:
          anchor: centered_or_bottom_sheet
          width_policy: "clamp between 312px and 720px with 18px minimum side margins"
          height_policy: "variant-defined; never exceed viewport safe area"
          ornament_policy: "Crest and corner leaves are fixed sprites outside the 9-slice skin and do not change content bounds."
        asset_keys:
          - ninja2.ui.panel.parchment_9slice
          - ninja2.ui.level_choice.frame_ornaments_v1
      modal_header:
        role: "Expose title, kicker, subtitle, and optional resource/status chip as native text slots."
        process_scope: section
        components:
          - ModalHeader
        layout_contract:
          anchor: shell_top
          min_height_px: 74
          padding_px: { left: 22, right: 58, top: 28, bottom: 8 }
          clamp_policy: "Subtitle hides before title size drops below 22px."
      modal_body:
        role: "Switch between message, reward, list, settings, notice, and three-choice bodies without changing the shell lifecycle."
        process_scope: section
        components:
          - ModalBodyRegion
          - ModalMessageBlock
          - ModalRewardGrid
          - ModalRewardSlot
          - ModalListRow
          - ModalToggleRow
          - SkillChoiceGrid
          - SkillChoiceCard
        layout_contract:
          gap_px: 10
          scroll_policy: "Only list/settings bodies may scroll internally; shell position and footer remain stable."
          variant_bodies:
            confirm: [ModalMessageBlock]
            reward: [ModalRewardGrid, ModalRewardSlot]
            list: [ModalListRow]
            settings: [ModalToggleRow]
            skillChoice: [SkillChoiceGrid, SkillChoiceCard]
            notice: [ModalMessageBlock]
      modal_footer:
        role: "Own stable action rows, two-button confirmation, hidden-footer notice state, and compact toast affordances."
        process_scope: section
        components:
          - ModalFooter
          - ModalActionButton
          - ModalNoticeToast
        layout_contract:
          min_height_px: 74
          action_count_range: [0, 2]
          button_height_px: 52
          button_gap_px: 12
          close_policy: "Footer action closes the active modal only through ModalHost so focus/pause state is restored consistently."
    component_tree:
      - ModalHarnessViewport
      - ModalHost
      - ModalScrim
      - ModalShell
      - FrameOrnamentLayer
      - ModalCloseButton
      - ModalHeader
      - ModalBodyRegion
      - ModalMessageBlock
      - ModalRewardGrid
      - ModalRewardSlot
      - ModalListRow
      - ModalToggleRow
      - SkillChoiceGrid
      - SkillChoiceCard
      - ModalFooter
      - ModalActionButton
      - ModalNoticeToast
    layout_contract:
      harness_page: ../../runtime/phaser-modal-system-harness.html
      implementation_mode: phaser_canvas
      variants: [shell, confirm, reward, list, settings, skillChoice, notice]
      safe_area_policy: "All shell measurements include top/bottom safe margins; mobile compact reduces body copy before touch targets."
      renderer_policy: "Use Phaser 4 scene.add.nineslice for the parchment skin when the theme provides the texture; use Phaser graphics only as debug fallback."

components:
  HomeTopBand:
    role: "Compact top HUD group from the rulelocked housing concept."
    mode: hybrid
    anatomy:
      - HeroPortraitStatus
      - TopResourcePillRow
      - PopulationMenuCluster
      - dark_top_mask
    box_model:
      position: absolute_top
      height_px: { target: 96, compact: 92 }
      padding_px: { left: 8, right: 8, top: 8, bottom: 0 }
      grid_template: "profile overlaps left; resources run horizontally across top; population/menu/settings sit under right resource pills"
      gap_px: 7
    implementation_notes:
      - "Do not add a centered sanctuary status plaque; that belongs to the rejected top/bottom-tabs concept, not this rulelocked concept."
      - "This section frames the forest edge; it does not own the hex board or sortie CTA."

  HeroPortraitStatus:
    role: "Shows the guardian face, level badge, and green status/progress bar as one fixed top-left identity cluster."
    mode: hybrid
    anatomy:
      - circular_gold_portrait_frame
      - guardian_avatar_sprite
      - lantern_sprite
      - round_level_badge
      - green_progress_bar
    box_model:
      size_px: { width: 86, height: 78 }
      portrait_diameter_px: 72
      level_badge_px: 26
      progress_bar_px: { width: 68, height: 13 }
      progress_anchor: bottom_right_of_portrait
    asset_contract:
      asset_key: ninja2.ui.profile.guardian_avatar
      usage: avatar_sprite_inside_native_gold_frame
      not_nine_slice: true
    data_bindings:
      level: sanctuary.shrineLevel_or_playerLevel
      progress: guardian.hp_or_home_status_progress
    implementation_notes:
      - "There is no name text inside the top-left portrait cluster in the rulelocked concept."

  TopResourcePillRow:
    role: "Keeps the primary resources as separate dark horizontal pills across the top row."
    mode: hybrid
    repeatable: false
    anatomy:
      - TopResourcePill[4]
      - optional_plus_button
    box_model:
      anchor: top_right_of_profile_cluster
      height_px: 39
      columns: 4
      gap_px: 8
      available_width_px: 330
    data_bindings:
      resources: [wood, soulflame, gold, stone]
    implementation_notes:
      - "The correct concept uses a single horizontal resource row, not a 2x2 board."

  TopResourcePill:
    role: "One top resource counter pill with an icon on the left and native value text."
    mode: hybrid
    repeatable: true
    anatomy:
      - pill_frame
      - resource_icon_sprite
      - value_text
      - optional_plus_button
    box_model:
      min_height_px: 38
      padding_px: { left: 9, right: 12, top: 5, bottom: 5 }
      grid_columns_px: [28, "1fr"]
      gap_px: 7
    skin_contract:
      asset_key: ninja2.ui.topbar.cluster_skins
      usage: phaser_nineslice_or_dom_preview.resource_chip_or_native_pill
      slice_hints_px: { left: 18, right: 18, top: 14, bottom: 14 }
      content_insets_px: { left: 9, right: 12, top: 5, bottom: 5 }
    text_policy:
      value: { max_lines: 1, font_size_px: 18, overflow: tabular_ellipsis }

  PopulationMenuCluster:
    role: "Keeps population capacity, menu, and settings as a compact second-row control cluster on the upper right."
    mode: native_ui
    anatomy:
      - population_pill
      - TopRoundIconButton[2]
    box_model:
      anchor: second_row_right
      columns: ["population", "menu", "settings"]
      population_size_px: { width: 134, height: 50 }
      button_size_px: 50
      gap_px: 11
    text_policy:
      resident_count: { max_lines: 1, font_size_px: 22 }
    asset_contract:
      asset_key: ninja2.ui.home_icon_pack_v3
      usage: population_icon_and_top_action_icons
      not_nine_slice: true

  TopRoundIconButton:
    role: "One round-corner top control button for menu or settings."
    mode: native_ui
    repeatable: true
    anatomy:
      - dark_button_shell
      - icon_glyph
    box_model:
      size_px: { width: 50, height: 50 }
      outline_px: 4
      radius_px: 14
    asset_contract:
      asset_key: ninja2.ui.home_icon_pack_v3
      usage: menu_settings_image_icons
      not_nine_slice: true

  HomeSideRail:
    role: "Secondary vertical entry rail for mail, gifts, inventory, and pass."
    mode: native_ui
    anatomy:
      - rail_backplate
      - HomeSideButton[4]
    entries: ["우편", "선물", "가방", "패스"]
    box_model:
      position: absolute_left
      top_px: 196
      width_px: 56
      gap_px: 8
      padding_px: { left: 0, right: 0, top: 0, bottom: 0 }
    constraints:
      - "Cost markers should never become visually primary behind this rail."

  HomeSideButton:
    role: "One secondary home entry button."
    mode: native_ui
    repeatable: true
    anatomy:
      - icon_disc
      - label_text
      - optional_badge
    box_model:
      size_px: { width: 56, height: 58 }
      grid_rows_px: [28, 19]
      gap_px: 2
    text_policy:
      label: { max_lines: 1, font_size_px: 10, overflow: ellipsis }
    asset_contract:
      asset_key: ninja2.ui.home_icon_pack_v3
      usage: side_rail_image_icons
      not_nine_slice: true

  HomeBoardViewport:
    role: "Owns the camera window and pan/scale behavior for the city board."
    mode: hybrid
    anatomy:
      - forest_background
      - draggable_grid
      - HexTileLayer
      - SettlementOrnamentLayer
      - BuildingSpriteToken
      - ExpansionCostMarker
    box_model:
      position: absolute_between_sections
      inset_px: { top: 184, right: 0, bottom: 250, left: 0 }
      grid_size_px: { width: 430, height: 590 }
      transform: { x: 10, y: -70, scale: 1.04 }
    asset_contract:
      asset_key: ninja2.home.background.forest_sanctuary
      usage: css_background_cover
      not_nine_slice: true

  HexTileLayer:
    role: "Renders stable tile states and footprints underneath buildings."
    mode: hybrid
    anatomy:
      - built_tile
      - selected_tile
      - empty_tile
      - expand_tile
      - locked_tile
      - fog_tile
    box_model:
      tile_size_px: { width: 86, height: 99 }
      axial_step_px: { q_x: 73, r_x: 36.5, r_y: 65 }
    asset_contract:
      asset_key: ninja2.home.hex_tile_set.forest_sanctuary
      usage: state_specific_image
      not_nine_slice: true

  SettlementOrnamentLayer:
    role: "Adds owned-ground, paths, foundations, and props so the board reads as a city instead of isolated tokens."
    mode: native_ui
    anatomy:
      - owned_ground_clearance
      - paths
      - foundations
      - props
    box_model:
      position: inside_board_grid
      pointer_events: none
      y_sort_policy: below_buildings_above_hexes

  BuildingSpriteToken:
    role: "One y-sorted visible building token, including level badge and footprint ownership."
    mode: hybrid
    repeatable: true
    anatomy:
      - building_sprite_or_blueprint
      - level_badge
      - BuildingProductionBubble
      - selected_glow
    box_model:
      anchor: footprint_center
      pointer_target: full_sprite_bounds
      size_source: housing_tech.visual
    asset_contract:
      asset_key: ninja2.home.building_atlas.lantern_sanctuary
      usage: individual_building_sprites
      not_nine_slice: true
    text_policy:
      level_badge: { max_lines: 1, font_size_px: 10 }

  BuildingProductionBubble:
    role: "Shows the most important production or construction state for a building."
    mode: native_ui
    repeatable: true
    anatomy:
      - bubble_shell
      - compact_output_text
    box_model:
      anchor: above_building_sprite
      min_width_px: 34
      padding_px: { left: 5, right: 5, top: 1, bottom: 2 }
    text_policy:
      output: { max_lines: 1, font_size_px: 9, overflow: compact }

  ExpansionCostMarker:
    role: "Marks expansion costs without stealing focus from buildings or the selected panel."
    mode: native_ui
    repeatable: true
    anatomy:
      - cost_text
      - optional_resource_icon
    box_model:
      anchor: center_of_expand_tile
      min_touch_priority: low
    text_policy:
      cost: { max_lines: 1, font_size_px: { target: 17, compact: 14 }, overflow: fade_near_edges }
    constraints:
      - "Should de-emphasize near side rail and bottom action row."

  HomeBottomActionRow:
    role: "Container that aligns companion shortcuts, selected building panel, and sortie CTA above the nav dock."
    mode: hybrid
    anatomy:
      - CompanionShortcutStrip
      - SelectedBuildingPanel
      - SortieCtaButton
    box_model:
      position: absolute_above_nav
      bottom_px: 96
      left_px: 10
      right_reserved_for_sortie_px: 120
      row_gap_px: 8
      min_height_px: 118
    constraints:
      - "The loop toast must sit above this row, not inside the panel skin."
      - "No standalone left quick collect card; production readiness lives inside SelectedBuildingPanel."

  IntegratedCollectStatusChip:
    role: "Shows selected-building production/readiness inside the selected building panel without creating an external collect button."
    mode: native_ui
    anatomy:
      - small_resource_icon
      - readiness_label
      - rate_or_gain_text
    box_model:
      min_width_px: 48
      min_height_px: 28
      padding_px: { left: 6, right: 6, top: 4, bottom: 4 }
    data_bindings:
      selected_building_rate: selected_building_resource_rate_per_minute
      global_rate: sum_home_resource_rates_per_minute
      optional_click_action: existing_home_income_tick_when_ready
    text_policy:
      label: { max_lines: 1, font_size_px: 10, overflow: ellipsis }
      rate: { max_lines: 1, font_size_px: 9, overflow: ellipsis }
    asset_contract:
      asset_key: ninja2.ui.home_icon_pack_v3
      usage: integrated_collect_status_icon
      not_nine_slice: true

  CompanionShortcutStrip:
    role: "Shows the D1 companion roster as three compact shortcuts into companion management above the action row."
    mode: native_ui
    repeatable: false
    anatomy:
      - companion_slot[3]
      - colored_status_dot
      - companion_name
      - roster_state_copy
    box_model:
      position: above_bottom_action_row
      left_px: 10
      right_reserved_for_sortie_px: 122
      min_height_px: 50
      gap_px: 6
    text_policy:
      name: { max_lines: 1, font_size_px: 12, overflow: ellipsis }
      state: { max_lines: 1, font_size_px: 8, overflow: ellipsis }

