      padding_px: { x: 6, y: 5 }
      margin_top_px: 9
      radius_px: 7
      outline_px: 2
    text_policy:
      max_lines: 2
      font_size_px: 11
      priority_order:
        - damage_or_heal_delta
        - cooldown_or_duration_delta
        - special_rule
    visual:
      fill: "rgba(112, 78, 39, .28)"
      selected_fill: "rgba(255, 198, 74, .18)"

  CategoryChip:
    role: "Labels the skill family without becoming the primary reading target."
    mode: native_ui
    box_model:
      align: bottom_center
      min_width_px: 56
      padding_px: { x: 9, y: 5 }
      radius_px: 6
      outline_px: 2
    text_policy:
      max_lines: 1
      font_size_px: 11
    visual:
      fill: "deep forest"
      text: "cream cloak"

  RerollFooter:
    role: "Optional second-choice affordance using run-limited soulflame cost."
    mode: hybrid
    optional: true
    first_pass_policy: "Hide unless reroll economy is wired."
    anatomy:
      - reroll_button_skin
      - reroll_icon
      - cost_icon
      - cost_text
      - remaining_count_text
    box_model:
      anchor: bottom_center
      min_width_px: 142
      min_height_px: 34
      padding_px: { x: 12, y: 7 }
      margin_bottom_px: 16
    skin_contract:
      asset_key: null
      usage: native_ui_until_wired
      future_asset_key: ninja2.ui.button.reroll_small_9slice
      content_insets_px: { left: 12, right: 12, top: 7, bottom: 7 }

