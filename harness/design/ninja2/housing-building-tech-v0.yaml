asset_production_plan:
  existing_pipeline:
    summary: "Generated transparent atlas -> chroma-key removal -> connected-component crops -> runtime PNGs."
    source_atlas: harness/design/ninja2/assets/home/building_atlas_lantern_sanctuary.png
    runtime_folder: harness/runtime/assets/ninja2/home/buildings/
    existing_runtime_sprites:
      - shrine
      - wood_workshop
      - herb_garden
      - training_yard
      - storage
      - soulflame_well
      - guard_lantern
  generation_rules:
    background: transparent
    no_baked_text: true
    style: "2.5D pre-rendered sprite impression, bold dark outline, teal roof, lantern windows, stone base"
    target_sheet_size: { width: 1536, height: 1024 }
    crop_mode: "individual transparent PNG per building for Phaser; shared sprite/atlas for Unity"
    footprint_visibility: "Sprite size must match footprint; large building footprint is data-driven, not only visual scale."
  extension_atlas_needed:
    key: ninja2.home.building_atlas.sanctuary_extension_a
    priority: should
    status: generated
    variants:
      - { sprite_key: stone_quarry, footprint: "1x2", note: "stone pit plus small pulley/cart, not a mine cave that reads as combat dungeon" }
      - { sprite_key: workshop, footprint: "1x2", note: "tool bench, small chimney, wood/iron details" }
      - { sprite_key: scout_post, footprint: "1x1", note: "watch platform, map board, small lantern" }
      - { sprite_key: granary, footprint: "1x2", note: "food storage for D7+" }
      - { sprite_key: bamboo_grove, footprint: "1x3", note: "renewable bamboo production tile" }
      - { sprite_key: iron_mine, footprint: "1x2", note: "midgame metal source" }

implementation_notes:
  engine_item_yaml:
    safe_fields: ["category=Mine", "efficiencyPercents", "maxStamina", "staminaRegenPerSecond", "levelUpMaterialItemGroups", "sellAddItemGroups", "spriteGroups", "popupArgs"]
    timing_contract: "Mirror construction.seconds into popupArgs.HousingConstructionSeconds and level_curve[].level_up.seconds into popupArgs.HousingLevelUpSeconds for every building item draft."
    placement_contract: "Mirror placement_kind, instance_role, and max_instances_by_lantern_level into popupArgs.HousingPlacementKind, HousingInstanceRole, and HousingMaxInstancesByLanternLevel."
    caution: "construction seconds, footprint, tile occupancy, placement instance state, and build cost should stay in housing runtime data or popupArgs until engine contract is extended."
  phaser_runtime:
    current_state: "survivor-app.js renders home BUILDINGS from housing-tech.js and tracks built/locked/buildable/constructing states by building key."
    next_step: "Replace builtBuildings[key] with placedBuildingInstances[instance_id], then generate housing-tech data from this YAML."
  unity_runtime:
    next_step: "Use footprint, sprite_key, foundation kind, and construction timers to build a uGUI/grid prefab recipe."
