economy_targets:
  current_stage1_expected_run:
    assumption: "25 normal kills + 1 boss + map clear reward"
    rewards:
      gold: 910
      exp: 280
      wood: 21
      stone: 6.2
      soulflame: 0.47
  first_day:
    first_upgrade_after_runs: "1~2"
    first_new_building_after_runs: "2~4"
    first_ring_expansion_after_minutes: "15~25"
    first_soulflame_bottleneck_after_minutes: "45~90"

footprint_rules:
  "1x1":
    hexes: 1
    use_for: ["watch", "well", "small utility"]
    visual_size_px: { w: 70, h: 92 }
  "1x2":
    hexes: 2
    use_for: ["production hut", "storage", "workshop"]
    visual_size_px: { w: 112, h: 96 }
  "1x3":
    hexes: 3
    use_for: ["garden", "training yard", "long outdoor facility"]
    visual_size_px: { w: 146, h: 84 }
  "2x2":
    hexes: 4
    use_for: ["town center", "central shrine"]
    visual_size_px: { w: 142, h: 134 }

tech_tree:
  start:
    unlocked_buildings: [lantern_shrine, wood_workshop]
    starting_built: [lantern_shrine, wood_workshop]
  ring_1:
    unlock_condition: { lantern_shrine_level: 2 }
    buildings: [stone_quarry, training_yard, soulflame_well]
    expansion_costs:
      - { tile_state: "expandable_to_empty", tile_count: 1, cost: { wood: 35, stone: 6 }, time_seconds: 30 }
      - { tile_state: "expandable_to_empty", tile_count: 2, cost: { wood: 55, stone: 12 }, time_seconds: 90 }
      - { tile_state: "expandable_to_empty", tile_count: 3, cost: { wood: 90, stone: 24, soulflame: 1 }, time_seconds: 180 }
  ring_2:
    unlock_condition: { lantern_shrine_level: 4 }
    buildings: [herb_garden, resident_lodge, workshop, guard_lantern, scout_post]
    expansion_costs:
      - { tile_state: "fogged_to_expandable", cost: { lantern: 1 }, time_seconds: 0 }
      - { tile_state: "expandable_to_empty", cost: { wood: 150, stone: 55, soulflame: 2 }, time_seconds: 600 }
  ring_3:
    unlock_condition: { lantern_shrine_level: 6 }
    buildings: [granary, bamboo_grove, iron_mine]
    note: "D7 이후. D1 데이터에는 비용 방향만 남긴다."

