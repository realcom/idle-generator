version: "0.1"
game: ninja2
status: draft
updated_at: 2026-06-04
purpose: "Early housing building tech tree, level effects, construction costs/times, footprints, and asset production plan."

schema_notes:
  construction: "Cost/time to place the building for the first time."
  level_curve: "Each row describes the effect active at that level."
  level_up: "For level N rows where N > 1, this is the cost/time required to reach level N from level N-1."
  costs: "Resource keys use resource_ids names; convert to item ids only at compile/runtime binding time."

source_runtime:
  phaser_home: harness/runtime/src/survivor/survivor-app.js
  phaser_runtime_data: harness/runtime/src/survivor/housing-tech.js
  existing_runtime_building_sprites: harness/runtime/assets/ninja2/home/buildings/
  asset_plan: harness/design/ninja2/asset-plan.yaml
  component_skins: harness/design/ninja2/component-skins.yaml

