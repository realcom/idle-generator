version: "0.1"
game: ninja2
status: draft
updated_at: 2026-06-07
purpose: "Housing building tech tree, level effects, construction costs/times, footprints, resident jobs, and asset production plan."

schema_notes:
  construction: "Cost/time to place the building for the first time."
  level_curve: "Each row describes the effect active at that level."
  level_up: "For level N rows where N > 1, this is the cost/time required to reach level N from level N-1."
  costs: "Resource keys use resource_ids names; convert to item ids only at compile/runtime binding time."

source_runtime:
  phaser_home: harness/runtime/src/survivor/survivor-app.js
  phaser_runtime_data: harness/runtime/src/survivor/housing-tech.js
  existing_runtime_building_sprites: harness/runtime/assets/ninja2/home/buildings/
  asset_plan: harness/design/ninja2/asset-plan.yaml
  component_skins: harness/design/ninja2/component-skins.yaml
  content_items: harness/content/ninja2/items/_index.yaml

resource_ids:
  gold: 5
  exp: 6
  lantern: 8
  wood: 200101
  stone: 200102
  soulflame: 200103
  planned:
    soil: 200104
    clay: 200105
    bamboo: 200106
    iron_ore: 200107
    herb: 200108
    food: 200109
    tool: 200110
    companion_shard: 200111

resource_names:
  5: "골드"
  6: "경험치"
  8: "등불"
  200101: "목재"
  200102: "석재"
  200103: "영혼불"
  200104: "흙"
  200105: "점토"
  200106: "대나무"
  200107: "철광석"
  200108: "허브"
  200109: "식량"
  200110: "도구"
  200111: "동료 조각"

economy_targets:
  current_stage1_expected_run:
    assumption: "25 normal kills + 1 boss + map clear reward"
    rewards:
      gold: 910
      exp: 280
      wood: 21
      stone: 6.2
      soulflame: 0.47
  first_day:
    first_upgrade_after_runs: "1~2"
    first_new_building_after_runs: "2~4"
    first_ring_expansion_after_minutes: "15~25"
    first_soulflame_bottleneck_after_minutes: "45~90"
  first_week:
    ring_2_unlock: "D1 late or D2, after lantern shrine Lv 4 and first soulflame bottleneck"
    first_expedition_choice: "D2, scout post Lv 1 opens one focused resource expedition slot"
    first_resident_pressure: "D2~D3, lodge cap and food start limiting parallel production jobs"
    ring_3_unlock: "D5~D7, after lantern shrine Lv 6 and D7 map series validation"

content_alignment:
  canonical_display_names:
    200101: "목재"
    200102: "석재"
    200103: "영혼불"
    200601: "용병 훈련소"
    200602: "목재 작업장"
    200603: "영혼광맥"
  legacy_draft_file_aliases:
    200101: "영지 목재"
    200102: "기와석"
    200103: "그림자 광석"
    200601: "수련마당"
    200602: "대나무창고"
    200603: "그림자광맥"
  rule: "Runtime/UI should prefer canonical_display_names; legacy draft filenames can remain until approval/renaming pass."

loop_layers:
  d1_core_loop:
    goal: "One survival run funds at least one visible housing action."
    buildings: [lantern_shrine, wood_workshop, training_yard, stone_quarry, soulflame_well]
    exposed_resources: [gold, exp, wood, stone, soulflame, lantern]
  d2_to_d3_choice_loop:
    goal: "Player chooses between faster production, companion growth, boss stability, or targeted farming."
    buildings: [herb_garden, resident_lodge, workshop, guard_lantern, scout_post]
    exposed_resources: [herb, food, tool, companion_shard]
  d5_to_d7_expansion_loop:
    goal: "Ring 3 turns the sanctuary into a small survival town with supply chains."
    buildings: [granary, bamboo_grove, iron_mine]
    exposed_resources: [bamboo, iron_ore]

resident_jobs:
  max_parallel_jobs_source: "lantern_shrine.effect.resident_cap + resident_lodge.effect.resident_cap_bonus"
  assignment_rule: "A built production building can be assigned one resident; assigned buildings gain the resident bonus and show a board resident sprite."
  food_rule: "Ring 3 assignments consume food only for long expeditions, not for D1 passive production."
  jobs:
    - { key: lumber, building: wood_workshop, output_bonus_percent: [0, 4, 8, 12, 18], resident_variant: wood_resident }
    - { key: quarry, building: stone_quarry, output_bonus_percent: [0, 4, 8, 12, 18], resident_variant: wood_resident }
    - { key: herb_tend, building: herb_garden, output_bonus_percent: [0, 5, 10, 15, 22], resident_variant: herb_resident }
    - { key: guard, building: guard_lantern, boss_damage_bonus_percent: [0, 1, 2, 3, 5], resident_variant: guard_resident }
    - { key: scout, building: scout_post, expedition_time_reduction_percent: [0, 3, 6, 10, 15], resident_variant: courier_resident }

adjacency_bonuses:
  implementation_status: design_only
  rule: "Keep bonuses small and readable; no bonus is required for D1 progression."
  pairs:
    - { a: lantern_shrine, b: guard_lantern, bonus: { boss_damage_percent: 1, light_radius: 3 } }
    - { a: wood_workshop, b: workshop, bonus: { construction_time_reduction_percent: 2 } }
    - { a: herb_garden, b: resident_lodge, bonus: { recovery_percent: 1, offline_cap_hours_bonus: 0.25 } }
    - { a: scout_post, b: granary, bonus: { expedition_food_cost_reduction_percent: 5 } }
    - { a: iron_mine, b: workshop, bonus: { tool_per_hour: 1 } }

footprint_rules:
  "1x1":
    hexes: 1
    use_for: ["watch", "well", "small utility"]
    visual_size_px: { w: 70, h: 92 }
  "1x2":
    hexes: 2
    use_for: ["production hut", "storage", "workshop"]
    visual_size_px: { w: 112, h: 96 }
  "1x3":
    hexes: 3
    use_for: ["garden", "training yard", "long outdoor facility"]
    visual_size_px: { w: 146, h: 84 }
  "2x2":
    hexes: 4
    use_for: ["town center", "central shrine"]
    visual_size_px: { w: 142, h: 134 }

placement_model:
  principle: "Building definitions are blueprints; actual board placements are instances with their own tile occupancy, construction timer, level, storage, and resident assignment."
  instance_id_format: "<building_key>#<ordinal>"
  blueprint_state: "Unlock rules, footprint, sprite_key, and level_curve live on the building key."
  instance_state: "Runtime should store placed instance ids; each instance can be built, upgraded, and assigned independently."
  singleton_rule: "Core, management, and global buff buildings are unique unless explicitly changed."
  repeatable_rule: "Storage and normal production buildings can be placed multiple times when enough tiles are open."
  default_duplicate_scaling:
    cost_multiplier_per_extra: 1.25
    time_multiplier_per_extra: 1.15
    effect_stack: "Production, storage, and capacity effects stack additively across instances; global percent bonuses should be capped during balance review."
  repeatable_buildings: [wood_workshop, stone_quarry, herb_garden, resident_lodge, granary, bamboo_grove, iron_mine]
  singleton_buildings: [lantern_shrine, training_yard, soulflame_well, workshop, guard_lantern, scout_post]

tech_tree:
  start:
    unlocked_buildings: [lantern_shrine, wood_workshop]
    starting_built: [lantern_shrine]
    tutorial_build_order: [wood_workshop, training_yard]
  ring_1:
    unlock_condition: { lantern_shrine_level: 2 }
    buildings: [stone_quarry, training_yard, soulflame_well]
    expansion_costs:
      - { tile_state: "expandable_to_empty", tile_count: 1, cost: { wood: 35, stone: 6 }, time_seconds: 30 }
      - { tile_state: "expandable_to_empty", tile_count: 2, cost: { wood: 55, stone: 12 }, time_seconds: 90 }
      - { tile_state: "expandable_to_empty", tile_count: 3, cost: { wood: 90, stone: 24, soulflame: 1 }, time_seconds: 180 }
  ring_2:
    unlock_condition: { lantern_shrine_level: 4 }
    buildings: [herb_garden, resident_lodge, workshop, guard_lantern, scout_post]
    expansion_costs:
      - { tile_state: "fogged_to_expandable", cost: { lantern: 1 }, time_seconds: 0 }
      - { tile_state: "expandable_to_empty", cost: { wood: 150, stone: 55, soulflame: 2 }, time_seconds: 600 }
  ring_3:
    unlock_condition: { lantern_shrine_level: 6, resident_lodge_level: 3, scout_post_level: 2 }
    buildings: [granary, bamboo_grove, iron_mine]
    expansion_costs:
      - { tile_state: "fogged_to_expandable", cost: { lantern: 2, soulflame: 6 }, time_seconds: 0 }
      - { tile_state: "expandable_to_empty", cost: { wood: 420, stone: 240, soulflame: 10, tool: 4 }, time_seconds: 1800 }
      - { tile_state: "expandable_to_empty", cost: { wood: 720, stone: 420, soulflame: 18, bamboo: 60, tool: 8 }, time_seconds: 3600 }
    note: "D5~D7 target. Keep data draft-only until resource expedition and resident food sinks are validated."

