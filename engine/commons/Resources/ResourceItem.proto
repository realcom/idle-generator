  int32 parentId = 101;
  int32 materialId = 102;
  Category category = 103;
  Type type = 104;
  int32 grade = 105;
  int32 extraGrade = 112;
  int32 power = 106;
  float constantDamageRatio = 107;
  int32 rarity = 108;
  int32 tier = 109;
  google.protobuf.Timestamp startAt = 110;
  google.protobuf.Timestamp untilAt = 111;
  repeated float powerAttackMultiplyPercents = 113;
  repeated float powerDefenseMultiplyPercents = 114;
  repeated float powerHpMultiplyPercents = 115;
  
  //TODO: Client only data. Move to Client data table
  float inventoryShakeSpeed = 150;
  float inventoryShakeMagnitude = 151;

  string name = 200;
  string prefab = 201;
  string sprite = 202;
  int32 tab = 203;
  int32 priority = 204;
  int32 unitDataId = 205;
  int32 achievementDataId = 206;
  int32 achievementItemDataId = 207;
  int32 rankingItemDataId = 208;
  int32 group = 209;
  int32 order = 210;
  int32 skillDataId = 211;
  int32 productExpiredPushDays = 212;
  int32 productItemDataId = 213;
  int32 mergeSkillDataId = 214;
  int32 DiscardSkillDataId = 215;
  
