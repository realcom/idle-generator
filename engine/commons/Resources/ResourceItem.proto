  repeated Types.AddItemGroup DailyRewardAddItemGroups = 550;
  int32 dailyRewardMailDays = 551;
  
  repeated Types.MaterialItemGroup productMaterialItemGroups = 600;
  repeated Types.MaterialItemGroup materialItemGroups = 601;
  repeated Types.MaterialItemGroup levelUpMaterialItemGroups = 602;

