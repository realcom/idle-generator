  bool isDropPublic = 402;
  
  repeated int32 equipSkillDataIds = 403;
  repeated Types.Units.AddUnitStat addStats = 404;
  repeated Types.Units.AddUnitStat equipAddStats = 405;
  repeated Types.Units.AddBuff equipAddBuffs = 406;
  repeated Types.Units.ArmorTypeStat.AddArmorTypeStat addArmorTypeStats = 407;
  repeated Types.Units.ArmorTypeStat.AddArmorTypeStat equipAddArmorTypeStats = 408;
  repeated Types.Units.DamageTypeStat.AddDamageTypeStat addDamageTypeStats = 409;
  repeated Types.Units.DamageTypeStat.AddDamageTypeStat equipAddDamageTypeStats = 410;
  repeated Types.Units.ItemGroupStat.AddItemGroupStat addItemGroupStats = 411;
