  int32 initialCreateCount = 301;
  int32 initialCreateLevel = 302;
  bool unstackable = 303;
  bool disposable = 304;
  // 구매 제한 관련: 305 - 308
  repeated int32 requiredAchievementDataIds = 305;
  repeated int32 exclusiveAchievementDataIds = 306;
  repeated int32 requiredItemDataIds = 307;
  repeated int32 exclusiveItemDataIds = 308;
  repeated Tag requiredItemTags = 322;
  repeated Tag exclusiveItemTags = 323;
  int32 minCount = 309;
  int32 maxCount = 310;
  repeated int32 multipliers = 311;
  repeated float multiplierWeights = 312;
  int32 bonusCount = 313;
  int32 bonusItemDataId = 314;
  int32 sellPrice = 315;
  repeated Types.AddItemGroup sellAddItemGroups = 316;
  int32 reprocessableDelayMinutes = 317;
  int32 purchaseUnit = 318;
  int32 exp = 319;
  repeated int32 bonusCounts = 320;
  repeated int32 bonusItemDataIds = 321;
  int32 deadlineApproachingSeconds = 324;
  
