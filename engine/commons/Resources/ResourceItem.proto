message ResourceItem {
  message Global {
    message DataId {
      // 1-999: Player
      int32 playerLevel = 1;
      int32 credit = 2;
      int32 ruby = 3;
      int32 freeRuby = 4;
      int32 gold = 5;
      int32 exp = 6;
      int32 rankPoint = 7;
      int32 energy = 8;
      int32 stage = 9;
      
      // 100-199: Ninja Squad
      int32 maxUnitItemCount = 100;
      
      // 200-299: Hamzzi
      int32 abilityRank = 200;
      // special Utility Item
      int32 quickScoutProduct = 300;
      int32 respawnProduct = 301;
      
      // 1000-1999: Player Avatar
      int32 defaultCharacter = 1000;
      int32 defaultWeapon1 = 1001;
      int32 defaultWeapon2 = 1002;
      
      // 2000-2999: System
      int32 allMines = 2000;
      int32 mailNoticeCache = 2001;
      
      int32 tutorialGachaProduct = 10000;
      int32 tutorialSummonPetProduct = 10001;
    }
    
    message AvatarConstants {
      int32 maxUnitCount = 1;
      int32 maxDefenseUnitCount = 2;
      int32 maxOffenseUnitCount = 3;
    }

    DataId dataId = 1;
    AvatarConstants avatarConstants = 2;
  }
  
  enum Category {
    System = 0;
    
    Character = 1;
    Weapon = 2;
    Equipment = 3;
    Stat = 4;
    Skill = 5;
    Trait = 6;
    SlotRoot = 7;
    
    Material = 100; // 거의안쓰임...?
    
    Product = 200;
    Recipe = 201;
    Boost = 202;
    Utility = 203;
    GamePass = 204;
    Ticket = 205;
    SelectableBox = 206;
    Premium = 207;
    Attendance = 208;
    
    Unit = 300;  // param1: stamina, param2: refreshAt, (long)int.MaxValue * param3 + param4: Mine Item Id
    Mine = 301;
    Pet = 302;
    
    Ranking = 400;
    
    InventoryBundle = 10000;
    
  }
  
  enum Type {
    Unspecified = 0;
    
    // 100-199: System
    Setting = 100;
    SummonPetLevel = 101;
    PotentialLevel = 102;
    DailyQuestPoint = 103;
    WeeklyQuestPoint = 104;
    TimeLimitedMission = 105;
    Honor = 106;
    
    // 200-299: Weapon
    Katana = 200;
    Gun = 201;
    Dagger = 202;
    Hammer = 203;
    
    // 300-399: Equipment
    Costume = 300;
    Hair = 301;
    Head = 302;
    Chest = 303;
    Leg = 304;
    Boots = 305;
    Gloves = 306;
    Necklace = 307;
    Bracelet = 308;
    Ring = 309;
    CyberOperating = 310;
    CyberExosuit = 311;
    CyberSkeleton = 312;
    CyberArm = 313;
    CyberHand = 314;
    CyberLeg = 315;
    
    // 400-499: Boost
    MineBoost = 400;
    MaxUnitBoost = 401;
    MaxStaminaBoost = 402;
    StaminaRegenBoost = 403;
    
    // 500-599: Utility
    AddStamina = 500;
    AutoMerge = 501;
    AddInventory = 502;
    // would be deprecated
    AddMaxCount = 503;
    // would be deprecated
    AddRegenPeriod = 504;
    Scout = 505;
    Respawn = 506;
    
    // 600-699: Skill
    PlayerUnitActiveSkill = 600;
    InventorySkill = 601;
    
    // 700-799: Product
    NormalProduct = 700;  
    Gacha = 701;
    MaterialAd = 702;
    MaterialSingle = 703;
    MaterialMulti = 704;
    MaterialRealPrice = 705;
    MaterialAMAP = 707;
    Bundle = 706;
    
//   Roulette = 700;  // param1: bonusProgress
//    Pity = 701; // param1:  
    
    // 800 - 899: Trait
    Passive = 800;
    Learnable = 801;
    LearnableWithoutItem = 802;
    
    // 900 - 929: GamePass
    GamePassGroup = 902;
    GamePassMain = 900;
    GamePassSub = 901;
    
    // 930 - 959: Stat
    TrainingRank = 930;
    
    // 20600 - 20699: SelectableBox
    SeasonalSelectableBox = 20600;
    
    // 20800 - 20899: Attendance
    Attendance7Day = 20800;
  }
  
  enum WeaponCategory {
    Normal = 0;
    Explosive = 1;
    Feast = 2;
    Frozen = 3;
    Poison = 4;
    Consumable = 50;
  }
  
  message InventorySkillCommand {
    message CommandItem {
      int32 dx = 1;
      int32 dy = 2;
      int32 itemGroup = 3;
      int32 itemGrade = 4;
    }
    
    repeated CommandItem items = 1;
    int32 buffDataId = 2;
  }

  message InventoryCell {
    int32 dx = 1;
    int32 dy = 2;
  }
  
  repeated Tag tags = 1;
  map<string, string> spriteGroups = 2;
  map<string, string> popupArgs = 3;
  repeated int64 requiredExps = 4;
  map<int32, string> prefabGroups = 5;
  map<string, int32> relativeItemDataIdGroups = 6;

