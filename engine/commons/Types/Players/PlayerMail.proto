syntax = "proto3";
package Commons.Types.Players;

import "google/protobuf/timestamp.proto";
import "Player.proto";
import "PlayerItem.proto";

message PlayerMailAddItem {
  int32 itemDataId = 1;
  int64 itemCount = 2;
  int32 itemLevel = 3;
  int32 itemDays = 4;
  int32 itemHours = 5;
  PlayerItemOption itemOption = 6;
}

message PlayerMailOption{
  repeated PlayerMailAddItem addItems = 1;
}

message PlayerMailMessage {
  int64 id = 1;

  PlayerMessage sender = 2;

  google.protobuf.Timestamp untilAt = 3;
  string title = 4;
  string message = 5;

  //6 ~ 11: deprecated, use addItems
  int32 itemDataId = 6;
  int64 itemCount = 7;
  int32 itemLevel = 8;
  int32 itemDays = 9;
  int32 itemHours = 10;
  PlayerItemOption itemOption = 11;
  
  google.protobuf.Timestamp createdAt = 12;
  
  PlayerMailOption option = 13;
}
