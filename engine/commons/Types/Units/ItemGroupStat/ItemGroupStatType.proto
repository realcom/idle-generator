syntax = "proto3";
package Commons.Types.Units.ItemGroupStat;

enum ItemGroupStatType {
  DamagePercent = 0;
  CooldownPercent = 1;
  CriticalPercent = 2;
  CriticalDamagePercent = 3;
  KnockbackPercent = 4;
  AdditionalAttackPercent = 5;
  Count = 6;
}

message AddItemGroupStat {
  ItemGroupStatType type = 1;
  repeated int32 itemGroups = 2;
  repeated float value = 3;
}
