services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: idlez
      POSTGRES_USER: idlez
      POSTGRES_PASSWORD: idlez
    ports:
      - "${IDLEZ_LOCAL_PG_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idlez -d idlez"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./postgres/initdb/00-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./Server/Server/Models:/schema:ro

  world-server:
    build:
      context: ..
      dockerfile: server/Dockerfile.local
      args:
        PROJECT_PATH: Server/WorldServer/WorldServer.csproj
        APP_DLL: WorldServer.dll
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IDLEZ_DB_HOST: postgres
      IDLEZ_DB_PORT: "5432"
      IDLEZ_DB_NAME: idlez
      IDLEZ_DB_USER: idlez
      IDLEZ_DB_PASSWORD: idlez
      IDLEZ_RESOURCES_PATH: /PatchResources
      IDLEZ_ENABLE_PUSH_SERVICES: "false"
    ports:
      - "${IDLEZ_LOCAL_WORLD_PORT:-11177}:11177"
    volumes:
      - ./Server/WorldServer/Config.json:/app/Config.json:ro
      - ../client/Client/Assets/PatchResources:/PatchResources:ro

  api-server:
    build:
      context: ..
      dockerfile: server/Dockerfile.local
      args:
        PROJECT_PATH: Server/ApiServer/ApiServer.csproj
        APP_DLL: ApiServer.dll
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      world-server:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:5000
      IDLEZ_DB_HOST: postgres
      IDLEZ_DB_PORT: "5432"
      IDLEZ_DB_NAME: idlez
      IDLEZ_DB_USER: idlez
      IDLEZ_DB_PASSWORD: idlez
      IDLEZ_RESOURCES_PATH: /PatchResources
      IDLEZ_ADMIN_ID: admin
      IDLEZ_ADMIN_PASSWORD: admin
      IDLEZ_ADMIN_JWT_SECRET: local-dev-jwt-secret
    ports:
      - "${IDLEZ_LOCAL_API_PORT:-15000}:5000"
    volumes:
      - ./Server/ApiServer/Config.json:/app/Config.json:ro
      - ../client/Client/Assets/PatchResources:/PatchResources:ro

volumes:
  postgres_local_data:
