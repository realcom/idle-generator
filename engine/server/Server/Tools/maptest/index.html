<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Map demo</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #111;
        color: white;
        font-family: sans-serif;
      }
      button {
        background-color: #333;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        height: 40px;
      }
      #coord {
        margin: 10px;
      }
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        font-size: 1.5em;
      }
      #info {
        margin: 10px;
        position: absolute;
        top: 0px;
        right: 0px;
      }
    </style>
  </head>
  <body>
    <div id="nav0"></div>
    <div id="nav1"></div>
    <div id="coord"></div>
    <div id="info"></div>
    <div id="overlay">Drag and drop Maps.json to view</div>
    <div>
      <canvas id="map" width="800" height="600"></canvas>
    </div>
    <script src="map.js"></script>
  </body>
</html>
