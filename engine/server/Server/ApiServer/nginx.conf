server {
    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name idlez-api.puzzlemonsters.io;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}
